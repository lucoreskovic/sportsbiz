<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsBizNow! — Sports Industry News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Base surfaces */
    --bg: #f4f5f0;
    --surface: #ffffff;
    --surface-2: #ebede5;

    /* Text */
    --ink: #0b0c0e;
    --ink-2: #3d4147;
    --ink-3: #7b8086;

    /* Dividers */
    --rule: #d9dad1;
    --rule-strong: #b8bab1;

    /* Signature accent — electric lime. Used sparingly for live/active states. */
    --accent: #caff3f;
    --accent-dim: #a8d420;
    --accent-ink: #1a2400; /* for text on --accent backgrounds */

    /* Semantic colors */
    --green: #17a55f;       --green-light: #e1f7ea;
    --amber: #d97706;       --amber-light: #fef2dc;
    --blue: #2251ff;        --blue-light: #e2e8ff;
    --purple: #8b2cf4;      --purple-light: #f2e7fe;
    --red: #e11d48;         --red-light: #ffe0e6;
  }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.55;
    font-feature-settings: 'cv11', 'ss01', 'ss03'; /* Inter stylistic alternates */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .site-header { background: var(--ink); color: #fff; padding: 0 24px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .logo {
    font-family: 'Archivo', sans-serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.035em;
    line-height: 0.95;
    color: #fff;
    font-style: italic;
    text-transform: lowercase;
  }
  .logo em { color: var(--accent); font-style: italic; }
  .logo-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
    font-weight: 500;
  }
  .header-dateline { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.5); text-align: right; letter-spacing: .04em; line-height: 1.4; }
  .nav-bar { display: flex; align-items: center; gap: 2px; padding: 10px 0; overflow-x: auto; scrollbar-width: none; }
  .nav-bar::-webkit-scrollbar { display: none; }
  .nav-pill {
    font-family: 'Archivo', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer;
    background: transparent;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    transition: all .12s ease;
  }
  .nav-pill:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.3); }
  .nav-pill.active {
    background: var(--accent);
    color: var(--accent-ink);
    border-color: var(--accent);
  }
  .nav-chev { display: inline-block; font-size: 8px; margin-left: 4px; opacity: 0.7; transition: transform .15s; }
  .nav-pill.active .nav-chev { transform: rotate(180deg); opacity: 1; }
  .subnav-bar { display: none; align-items: center; gap: 6px; padding: 10px 0 12px; border-top: 1px solid rgba(255,255,255,0.06); }
  .subnav-bar.open { display: flex; }
  .subnav-prefix { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.3); margin-right: 4px; letter-spacing: 0; }
  .subnav-pill {
    font-family: 'Archivo', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    background: transparent;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    transition: all .12s ease;
  }
  .subnav-pill:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
  .subnav-pill.active {
    background: rgba(202,255,63,0.14);
    color: var(--accent);
    border-color: var(--accent);
  }
  .ticker-wrap {
    background: var(--ink);
    border-top: 1px solid var(--accent);
    overflow: hidden;
    white-space: nowrap;
    padding: 7px 0;
  }
  .ticker-inner {
    display: inline-block;
    animation: ticker 120s linear infinite;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.85);
    letter-spacing: .04em;
  }
  .ticker-inner .ticker-sep { color: var(--accent); margin: 0 10px; font-weight: 600; }
  @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
  .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid var(--rule); background: var(--surface); }
  .updated-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); letter-spacing: .04em; }
  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Archivo', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    border: 1px solid var(--rule-strong);
    cursor: pointer;
    background: var(--surface);
    color: var(--ink-2);
    transition: all .12s;
  }
  .refresh-btn:hover { background: var(--ink); color: var(--accent); border-color: var(--ink); }
  .refresh-btn:disabled { opacity: .5; cursor: not-allowed; }
  .refresh-btn.spinning svg { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .page { max-width: 1100px; margin: 0 auto; padding: 20px 24px 40px; display: grid; grid-template-columns: 1fr 260px; gap: 28px; align-items: start; }
  @media (max-width: 760px) { .page { grid-template-columns: 1fr; } }
  .loading-state { text-align: center; padding: 60px 0; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--rule); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
  .loading-title { font-size: 13px; font-weight: 600; color: var(--ink-2); }
  .loading-step  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3); margin-top: 5px; }
  .error-box { background: #fff8f8; border: 1px solid #ffd4d4; border-radius: 8px; padding: 24px; }
  .error-box h3 { font-size: 14px; color: var(--red); margin-bottom: 6px; }
  .error-box p  { font-size: 12px; color: var(--ink-2); line-height: 1.6; }
  .try-again-btn { margin-top: 14px; display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--rule); cursor: pointer; background: var(--surface); color: var(--ink-2); font-family: 'Inter', sans-serif; }
  .main-feed { display: flex; flex-direction: column; }
  .cluster { padding: 18px 0; border-bottom: 1px solid var(--rule); }
  .cluster:first-child { padding-top: 4px; }
  .cat-tag {
    display: inline-block;
    font-family: 'Archivo', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px;
    margin-bottom: 9px;
  }
  .tag-media     { background: var(--green-light);  color: var(--green);  }
  .tag-contracts { background: var(--amber-light);  color: var(--amber);  }
  .tag-leagues   { background: var(--blue-light);   color: var(--blue);   }
  .tag-revenue   { background: var(--purple-light); color: var(--purple); }
  .tag-labor     { background: var(--red-light);    color: var(--red);    }
  .tag-default   { background: var(--surface-2); color: var(--ink-3); }
  .lead-headline {
    font-family: 'Archivo', sans-serif;
    font-size: 22px; font-weight: 800;
    line-height: 1.2;
    letter-spacing: -0.015em;
    color: var(--ink);
    transition: color .12s; text-decoration: none; display: block;
  }
  .lead-headline:hover { color: var(--accent-dim); }
  .lead-source { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 6px; letter-spacing: .03em; }
  .lead-summary { font-size: 14px; color: var(--ink-2); margin-top: 9px; line-height: 1.6; max-width: 95%; }
  /* ARTICLE MODAL */
  .article-modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto; }
  .article-modal { background:var(--surface);max-width:680px;width:100%;border-radius:4px;padding:32px;position:relative;margin:auto; }
  .article-modal-close { position:absolute;top:14px;right:16px;font-size:20px;cursor:pointer;color:var(--ink-3);background:none;border:none;line-height:1; }
  .article-modal-close:hover { color:var(--ink); }
  .article-modal-tag { display:inline-block;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:10px; }
  .article-modal-headline { font-family:'Archivo',sans-serif;font-size:26px;font-weight:800;line-height:1.2;letter-spacing:-0.02em;color:var(--ink);margin-bottom:8px; }
  .article-modal-meta { font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-3);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--rule); }
  .article-modal-body { font-size:15px;color:var(--ink-2);line-height:1.75; }
  .article-modal-body p { margin-bottom:14px; }

  .posts-label { font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); margin-top: 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .posts-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .posts-list { display: flex; flex-direction: column; gap: 4px; }
  .post-card { background: var(--bg); border: 1px solid var(--rule); border-radius: 6px; padding: 6px 9px; text-decoration: none; display: block; transition: border-color .12s; }
  .post-card:hover { border-color: var(--ink-3); }
  .post-header { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
  .post-avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 600; flex-shrink: 0; color: #fff; }
  .avatar-x { background: #000; }
  .avatar-bluesky { background: #0085ff; }
  .post-meta { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 5px; }
  .post-name { font-size: 11px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-handle { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-3); white-space: nowrap; }
  .post-platform { flex-shrink: 0; width: 11px; height: 11px; }
  .post-body { font-size: 11px; color: var(--ink-2); line-height: 1.5; }
  .post-time { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-3); margin-top: 3px; }
  .sidebar { display: flex; flex-direction: column; }
  .sidebar-section { margin-bottom: 22px; }
  .sidebar-heading {
    font-family: 'Archivo', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink);
    border-bottom: 2px solid var(--ink);
    padding-bottom: 7px; margin-bottom: 12px;
  }
  .sidebar-item { display: flex; gap: 9px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--rule); text-decoration: none; transition: opacity .12s; }
  .sidebar-item:last-child { border-bottom: none; }
  .sidebar-item:hover { opacity: .7; }
  .sb-dot  { flex-shrink: 0; width: 6px; height: 6px; border-radius: 1px; background: var(--accent-dim); margin-top: 6px; }
  .sb-text { font-size: 12px; color: var(--ink); line-height: 1.45; font-weight: 500; }
  .sb-src  { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 3px; font-weight: 400; }
  .sidebar-promo {
    border: 1px dashed var(--rule-strong);
    border-radius: 2px;
    padding: 14px; text-align: center;
    color: var(--ink-3); font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .widget-box {
    background: var(--surface);
    border: 1px solid var(--ink);
    border-top: 3px solid var(--ink);
    margin-bottom: 28px;
  }
  .widget-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--rule); }
  .widget-title {
    font-family: 'Archivo', sans-serif;
    font-size: 14px; font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--ink);
    display: block;
  }
  .widget-switcher { display: flex; gap: 3px; }
  .widget-type-btn { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--rule); cursor: pointer; background: transparent; color: var(--ink-3); font-family: 'Inter', sans-serif; transition: all .12s; white-space: nowrap; }
  .widget-type-btn:hover  { background: var(--rule); color: var(--ink-2); }
  .widget-type-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .widget-body { padding: 14px; }
  .poll-question { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.4; margin-bottom: 12px; }
  .poll-option { margin-bottom: 7px; }
  .poll-option-btn { width: 100%; text-align: left; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--rule); background: var(--bg); cursor: pointer; font-size: 12px; color: var(--ink-2); font-family: 'Inter', sans-serif; transition: all .12s; }
  .poll-option-btn:hover  { border-color: var(--green); color: var(--green); background: var(--green-light); }
  .poll-result { margin-bottom: 8px; }
  .poll-result-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-2); margin-bottom: 3px; }
  .poll-result-pct { font-weight: 600; color: var(--ink); }
  .poll-bar-track { height: 5px; background: var(--rule); border-radius: 3px; overflow: hidden; }
  .poll-bar-fill  { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s ease; }
  .poll-bar-fill.winner { background: var(--ink); }
  .poll-meta  { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 10px; }
  .poll-reset { font-size: 10px; color: var(--ink-3); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: 'Inter', sans-serif; margin-left: 8px; }
  .score-league { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
  .score-game { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--rule); }
  .score-game:last-child { border-bottom: none; }
  .score-teams { flex: 1; }
  .score-team { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--ink-2); line-height: 1.7; }
  .score-team.winner { font-weight: 600; color: var(--ink); }
  .score-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; min-width: 28px; text-align: right; }
  .score-status { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-3); text-align: center; padding: 0 8px; white-space: nowrap; }
  .score-status.live { color: var(--red); font-weight: 600; }
  .score-tabs { display: flex; gap: 3px; margin-bottom: 10px; }
  .score-tab { font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--rule); cursor: pointer; background: transparent; color: var(--ink-3); font-family: 'Inter', sans-serif; transition: all .12s; }
  .score-tab:hover { background: var(--rule); }
  .score-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .score-loading { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3); padding: 12px 0; text-align: center; }
  .widget-blank { text-align: center; padding: 20px 0; }
  .picks-disclaimer { font-size: 9px; color: var(--ink-3); margin-top: 10px; font-family: JetBrains Mono, monospace; }
  .widget-blank-text { font-size: 12px; color: var(--ink-3); line-height: 1.6; }

  /* ─── Pick status badges (live/won/lost/push) and daily record strip ─── */
  .pick-status { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; }
  .pick-status.badge-live { background: rgba(26,122,69,0.15); color: var(--green); animation: dt-pulse 1.6s infinite; }
  .pick-status.badge-won  { background: var(--green); color: #fff; }
  .pick-status.badge-lost { background: var(--red); color: #fff; }
  .pick-status.badge-push { background: var(--ink-3); color: #fff; }
  .picks-record-strip {
    display: flex; align-items: center; flex-wrap: wrap; gap: 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: .06em; text-transform: uppercase;
    margin-bottom: 18px; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--rule); border-radius: 6px;
    color: var(--ink-3);
  }
  .picks-record-label { color: var(--ink-2); font-weight: 600; }
  .picks-record-wins { color: var(--green); font-weight: 700; }
  .picks-record-losses { color: var(--red); font-weight: 700; }
  .picks-record-push { color: var(--ink-3); font-weight: 600; }
  .picks-record-live { color: var(--green); font-weight: 700; animation: dt-pulse 1.6s infinite; }
  .picks-record-sep { color: var(--rule); }

  /* ─── Draft Tracker Banner ─── */
  .draft-tracker {
    background: var(--ink);
    color: #fff;
    padding: 14px 24px;
    border-bottom: 2px solid var(--accent);
    transition: padding .2s ease;
    position: relative;
  }
  .draft-tracker::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 30%, transparent 30%, transparent 100%);
  }
  .draft-tracker.expanded { padding: 14px 24px 22px; }
  .dt-header {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    cursor: pointer; user-select: none;
    padding: 4px 0;
    transition: opacity .15s;
  }
  .dt-header:hover { opacity: 0.85; }
  .draft-tracker.expanded .dt-header { margin-bottom: 14px; }
  .dt-live {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent-ink);
    font-weight: 700;
    letter-spacing: .14em;
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 2px;
    animation: dt-pulse 2s infinite;
  }
  @keyframes dt-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .dt-title {
    font-family: 'Archivo', sans-serif;
    font-size: 20px; font-weight: 800;
    letter-spacing: -0.015em;
    color: #fff;
  }
  .dt-count { font-size: 10px; color: rgba(255,255,255,0.55); font-family: 'JetBrains Mono', monospace; letter-spacing: .06em; text-transform: uppercase; }
  .dt-latest {
    font-size: 12px; color: rgba(255,255,255,0.78);
    font-family: 'Inter', sans-serif; font-weight: 500;
    padding-left: 16px; margin-left: 4px;
    border-left: 1px solid rgba(255,255,255,0.15);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 120px;
  }
  .dt-latest-num { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 700; margin-right: 6px; }
  .dt-toggle {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Archivo', sans-serif;
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.75);
    letter-spacing: .1em; text-transform: uppercase;
    padding: 5px 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 2px;
    transition: all .12s;
  }
  .dt-header:hover .dt-toggle { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .dt-chevron { display: inline-block; transition: transform .2s; font-size: 9px; }
  .draft-tracker.expanded .dt-chevron { transform: rotate(180deg); }
  .draft-tracker.collapsed .dt-list { display: none; }
  .draft-tracker.expanded .dt-latest { display: none; }
  .dt-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
  .dt-pick {
    display: flex; gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 2px;
    padding: 12px 14px;
    transition: all .15s;
  }
  .dt-pick:hover { border-color: var(--accent); background: rgba(202,255,63,0.06); }
  .dt-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700;
    color: var(--accent);
    min-width: 46px;
    line-height: 1;
  }
  .dt-num-round { display: block; font-size: 9px; color: rgba(255,255,255,0.4); font-weight: 500; letter-spacing: .06em; margin-top: 4px; }
  .dt-body { flex: 1; min-width: 0; }
  .dt-player { font-weight: 700; color: #fff; font-size: 14px; line-height: 1.35; font-family: 'Archivo', sans-serif; letter-spacing: -0.005em; }
  .dt-pos {
    display: inline-block; font-size: 9px; font-weight: 700;
    color: rgba(255,255,255,0.75); font-family: 'JetBrains Mono', monospace;
    margin-left: 6px; background: rgba(255,255,255,0.1);
    padding: 2px 6px; border-radius: 2px;
    letter-spacing: .06em;
  }
  .dt-team { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; font-weight: 500; }
  .dt-school { color: rgba(255,255,255,0.45); }
  .dt-note { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 6px; line-height: 1.5; }

  /* ─── Main-feed Scores (wider layout) ─── */
  .main-section-header { font-size: 11px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 16px; }
  .main-score-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .main-score-tab { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--rule); cursor: pointer; background: var(--surface); color: var(--ink-2); font-family: 'Inter', sans-serif; transition: all .15s; }
  .main-score-tab:hover { border-color: var(--ink-3); }
  .main-score-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .main-scores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .main-score-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 6px; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
  .main-score-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--ink-2); }
  .main-score-row.winner { font-weight: 600; color: var(--ink); }
  .main-score-team { flex: 1; }
  .main-score-num { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; min-width: 36px; text-align: right; }
  .main-score-footer { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); padding-top: 6px; border-top: 1px solid var(--rule); }
  .main-score-footer.live { color: var(--red); font-weight: 600; }

  /* ─── Main-feed Predictions (wider layout) ─── */
  .main-prediction-list { display: flex; flex-direction: column; gap: 18px; }
  .main-prediction-item { padding: 14px 0; border-bottom: 1px solid var(--rule); }
  .main-prediction-item:last-child { border-bottom: none; }
  .main-prediction-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 8px; }
  .main-prediction-statement { flex: 1; font-family: 'Archivo', sans-serif; font-size: 19px; font-weight: 800; line-height: 1.3; letter-spacing: -0.015em; color: var(--ink); }
  .main-prediction-pct { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--ink); white-space: nowrap; }
  .main-prediction-bar-track { height: 6px; background: var(--rule); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .main-prediction-bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .main-prediction-rationale { font-size: 13px; color: var(--ink-2); line-height: 1.6; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div>
      <div class="logo">Sports<em>Biz</em><span style="color:#fff">Now!</span></div>
      <div class="logo-sub">Sports Industry Intelligence</div>
    </div>
    <div class="header-dateline" id="hd-dateline"></div>
  </div>
  <nav class="nav-bar">
    <button class="nav-pill active" data-cat="all"      onclick="filterCat(this,'all')">All Stories</button>
    <button class="nav-pill" data-cat="media"     onclick="filterCat(this,'media')">Media &amp; Broadcast</button>
    <button class="nav-pill" data-cat="contracts" onclick="filterCat(this,'contracts')">Contracts</button>
    <button class="nav-pill" data-cat="leagues"   onclick="filterCat(this,'leagues')">Leagues</button>
    <button class="nav-pill" data-cat="revenue"   onclick="filterCat(this,'revenue')">Revenue &amp; Sponsorship</button>
    <button class="nav-pill" data-cat="labor"     onclick="filterCat(this,'labor')">Labor &amp; Cap</button>
    <button class="nav-pill" data-cat="analytics" onclick="filterCat(this,'analytics')">Sports Analytics<span class="nav-chev">▾</span></button>
  </nav>
  <nav class="subnav-bar" id="subnav-bar">
    <span class="subnav-prefix">↳</span>
    <button class="subnav-pill active" data-sub="picks"       onclick="filterSub(this,'picks')">Value Picks</button>
    <button class="subnav-pill"        data-sub="highlights"  onclick="filterSub(this,'highlights')">Highlights</button>
    <button class="subnav-pill"        data-sub="scores"      onclick="filterSub(this,'scores')">Scores</button>
    <button class="subnav-pill"        data-sub="predictions" onclick="filterSub(this,'predictions')">Predictions</button>
  </nav>
</header>

<div class="ticker-wrap"><div class="ticker-inner" id="ticker-inner">Loading sports business wire...</div></div>

<div class="toolbar">
  <span class="updated-label" id="updated-label">Loading...</span>
  <button class="refresh-btn" id="refresh-btn" onclick="loadStories()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Refresh
  </button>
</div>

<section id="draft-tracker" class="draft-tracker" style="display:none;"></section>

<div class="page">
  <div class="main-feed" id="main-feed">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-title">Loading latest sports business news...</div>
    </div>
  </div>
  <div class="sidebar">
    <div class="widget-box">
      <div class="widget-header">
        <span class="widget-title">Today's Poll</span>
      </div>
      <div class="widget-body" id="widget-body"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-heading">Quick Hits</div>
      <div id="sidebar-quick"></div>
    </div>
    <div class="sidebar-section" id="sidebar-move-section" style="display:none">
      <div class="sidebar-heading">On the Move</div>
      <div id="sidebar-move"></div>
    </div>
    <div class="sidebar-promo">SportsBizNow! Intelligence<br>Powered by RSS &amp; Claude AI</div>
  </div>
</div>

<script>
  var allData   = null;
  var activeCat = 'all';
  var activeSub = 'picks'; // sub-tab inside Sports Analytics: 'picks' | 'highlights'
  var activeWidget = 'poll';
  var POLL = { question: '', options: [] };
  var PICKS = [];
  var PREDICTIONS = [];
  var HIGHLIGHTS = [];

  // ESPN scoreboard endpoints for the Scores widget
  var ESPN_LEAGUES = [
    { id: 'nba', label: 'NBA', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard' },
    { id: 'mlb', label: 'MLB', url: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard'   },
    { id: 'nhl', label: 'NHL', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard'     },
    { id: 'nfl', label: 'NFL', url: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard'   }
  ];
  var activeLeague = 'nba';
  var scoresCache = {};

  var TAG = {
    media:     { label:'Media & Broadcast',    cls:'tag-media'     },
    contracts: { label:'Contracts',             cls:'tag-contracts' },
    leagues:   { label:'Leagues',               cls:'tag-leagues'   },
    revenue:   { label:'Revenue & Sponsorship', cls:'tag-revenue'   },
    labor:     { label:'Labor / Cap',           cls:'tag-labor'     },
    default:   { label:'Business',              cls:'tag-default'   }
  };

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function openArticle(idx) {
    var data = allData;
    if (!data || !data.clusters) return;
    var cl = data.clusters[idx];
    if (!cl) return;
    var tag = TAG[cl.category] || TAG.default;
    showArticleModal(tag, cl.leadHeadline, cl.leadSource, cl.article || cl.summary || '');
  }

  function openSidebarByIndex(idx) {
    var item = sidebarStore[idx];
    if (!item) return;
    openSidebarArticle(item.headline, item.source, item.article || item.headline);
  }

  function openSidebarArticle(headline, source, article) {
    showArticleModal(TAG.default, headline, source, article || headline);
  }

  function showArticleModal(tag, headline, source, articleText) {
    document.getElementById('modal-tag').className = 'article-modal-tag ' + (tag ? tag.cls : 'tag-default');
    document.getElementById('modal-tag').textContent = tag ? tag.label : 'Sports Business';
    document.getElementById('modal-headline').textContent = headline || '';
    document.getElementById('modal-meta').textContent = source || '';
    var body = document.getElementById('modal-body');
    var paras = String(articleText).split('\n').filter(function(p){return p.trim();});
    body.innerHTML = paras.map(function(p){return '<p>'+esc(p)+'</p>';}).join('');
    document.getElementById('article-modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeArticle(e) {
    if (e.target === document.getElementById('article-modal')) closeArticleBtn();
  }

  function closeArticleBtn() {
    document.getElementById('article-modal').style.display = 'none';
    document.body.style.overflow = '';
  }

  // Sidebar widget is now poll-only (Scores and Predictions moved to main feed under Sports Analytics)
  function renderWidget() {
    var body = document.getElementById('widget-body');
    if (!body) return;
    body.innerHTML = buildPoll();
  }

  function buildPoll() {
    if (!POLL || !POLL.question) return '<div style="padding:16px;color:var(--ink-3);font-size:13px;">Poll loading...</div>';
    var voted = localStorage.getItem('sb_poll_v1');
    if (voted) {
      var votes = JSON.parse(localStorage.getItem('sb_poll_votes') || '{}');
      var total = Object.values(votes).reduce(function(a,b){return a+b;},0) || 1;
      return '<div class="poll-question">'+esc(POLL.question)+'</div>' +
        POLL.options.map(function(opt,i) {
          var pct = Math.round(((votes[i]||0)/total)*100);
          var winner = pct === Math.max.apply(null,Object.values(votes).map(function(v){return Math.round((v/total)*100);}));
          return '<div class="poll-result">'+
            '<div class="poll-result-label"><span>'+esc(opt)+'</span><span class="poll-result-pct">'+pct+'%</span></div>'+
            '<div class="poll-bar-track"><div class="poll-bar-fill'+(winner?' winner':'')+'" style="width:'+pct+'%"></div></div>'+
          '</div>';
        }).join('') +
        '<div style="font-size:10px;color:var(--ink-3);margin-top:8px;">'+total+' vote'+(total===1?'':'s')+'</div>';
    }
    return '<div class="poll-question">'+esc(POLL.question)+'</div>' +
      POLL.options.map(function(opt,i) {
        return '<button class="poll-option" onclick="votePoll('+i+')">'+esc(opt)+'</button>';
      }).join('');
  }

  function votePoll(idx) {
    var votes = JSON.parse(localStorage.getItem('sb_poll_votes') || '{}');
    votes[idx] = (votes[idx]||0)+1;
    localStorage.setItem('sb_poll_votes', JSON.stringify(votes));
    localStorage.setItem('sb_poll_v1', '1');
    renderWidget();
  }

  function renderScoresFeed() {
    var feed = document.getElementById('main-feed');
    var tabs = ESPN_LEAGUES.map(function(l) {
      var active = l.id === activeLeague ? ' active' : '';
      return '<button class="main-score-tab' + active + '" onclick="fetchScores(\'' + l.id + '\')">' + l.label + '</button>';
    }).join('');
    feed.innerHTML = '<div class="cluster" style="padding-top:4px;border-bottom:none;">' +
      '<div class="main-section-header">Live scores &amp; schedules</div>' +
      '<div class="main-score-tabs">' + tabs + '</div>' +
      '<div id="scores-games" class="main-scores-grid"><div class="score-loading">Loading scores...</div></div>' +
    '</div>';
    // fetchScores writes into #scores-games; keep it in the same format by re-rendering each game card
    fetchScores(activeLeague);
  }

  function renderPredictionsFeed() {
    var feed = document.getElementById('main-feed');
    if (!PREDICTIONS || PREDICTIONS.length === 0) {
      feed.innerHTML = '<div class="cluster" style="padding-top:4px;">' +
        '<div class="main-section-header">Predictions</div>' +
        '<div class="widget-blank"><div class="widget-blank-text">Predictions will appear after the next story refresh.</div></div>' +
      '</div>';
      return;
    }
    var items = PREDICTIONS.map(function(p) {
      var pct = Math.min(100, Math.max(0, Math.round(p.probability)));
      var isHigh = pct >= 60;
      var fillColor = isHigh ? 'var(--ink)' : 'var(--green)';
      return '<div class="main-prediction-item">' +
        '<div class="main-prediction-head">' +
          '<div class="main-prediction-statement">' + esc(p.statement) + '</div>' +
          '<div class="main-prediction-pct">' + pct + '%</div>' +
        '</div>' +
        '<div class="main-prediction-bar-track"><div class="main-prediction-bar-fill" style="width:' + pct + '%;background:' + fillColor + ';"></div></div>' +
        (p.rationale ? '<div class="main-prediction-rationale">' + esc(p.rationale) + '</div>' : '') +
      '</div>';
    }).join('');
    feed.innerHTML = '<div class="cluster" style="padding-top:4px;border-bottom:none;">' +
      '<div class="main-section-header">Probability forecasts — next 7 days</div>' +
      '<div class="main-prediction-list">' + items + '</div>' +
    '</div>';
  }

  function setDateline() {
    var d = new Date();
    document.getElementById('hd-dateline').innerHTML =
      d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}) +
      '<br>' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});
  }

  function filterCat(btn, cat) {
    activeCat = cat;
    document.querySelectorAll('.nav-pill').forEach(function(p){p.classList.remove('active');});
    btn.classList.add('active');
    var subnav = document.getElementById('subnav-bar');
    if (cat === 'analytics') {
      // Open the sub-row and render whichever sub-tab was last active (defaults to picks).
      if (subnav) subnav.classList.add('open');
      document.querySelectorAll('.subnav-pill').forEach(function(p){
        p.classList.toggle('active', p.getAttribute('data-sub') === activeSub);
      });
      renderActiveSub();
      return;
    }
    if (subnav) subnav.classList.remove('open');
    if (allData) { renderFeed(allData); }
    else {
      document.getElementById('main-feed').innerHTML =
        '<div class="loading-state"><div class="spinner"></div><div class="loading-title">Loading...</div></div>';
    }
  }

  function filterSub(btn, sub) {
    activeSub = sub;
    document.querySelectorAll('.subnav-pill').forEach(function(p){p.classList.remove('active');});
    if (btn) btn.classList.add('active');
    renderActiveSub();
  }

  // Single dispatch for whichever Sports Analytics sub-tab is active.
  function renderActiveSub() {
    if (activeSub === 'highlights')       renderHighlightsFeed();
    else if (activeSub === 'scores')      renderScoresFeed();
    else if (activeSub === 'predictions') renderPredictionsFeed();
    else                                  renderPicksFeed();
  }

  function renderFeed(data) {
    var clusters = activeCat === 'all' ? data.clusters : data.clusters.filter(function(c){return c.category===activeCat;});
    var feed = document.getElementById('main-feed');
    if (!clusters || clusters.length === 0) {
      feed.innerHTML = '<div class="error-box"><h3>No stories in this category</h3><p>Try a different category or check back shortly.</p></div>';
      return;
    }
    // Build index map so we can pass original index to modal
    var clusterIndexes = clusters.map(function(cl) {
      return (allData.clusters || []).indexOf(cl);
    });
    feed.innerHTML = clusters.map(function(c, i) {
      var origIdx = clusterIndexes[i];
      var tag = TAG[c.category] || TAG.default;
      var posts = (c.posts || []).map(function(p) {
        var isX = (p.platform||'').toLowerCase() === 'x';
        var initials = (p.name||'?').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
        var icon = isX
          ? '<svg class="post-platform" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.253 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>'
          : '<svg class="post-platform" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#0085ff"/><path fill="white" d="M16.5 9.5c-.138 2.63-1.845 5.557-5.158 5.557-1.024 0-1.976-.3-2.777-.816.142.017.286.025.432.025 1.194 0 2.295-.407 3.168-1.09a2.573 2.573 0 0 1-2.4-1.784c.157.03.317.046.482.046.233 0 .46-.031.674-.09a2.571 2.571 0 0 1-2.06-2.52v-.032c.347.193.743.308 1.164.322a2.567 2.567 0 0 1-.795-3.43 7.3 7.3 0 0 0 5.3 2.686 2.572 2.572 0 0 1 4.379-2.344 5.15 5.15 0 0 0 1.632-.624 2.578 2.578 0 0 1-1.13 1.422A5.13 5.13 0 0 0 20 7.17a5.224 5.224 0 0 1-1.282 1.33z"/></svg>';
        var postText = p.content || '';
        return '<div class="post-card" style="cursor:default;">'+
          '<div class="post-header">'+
            '<div class="post-avatar '+(isX?'avatar-x':'avatar-bluesky')+'">'+initials+'</div>'+
            '<div class="post-meta"><span class="post-name">'+esc(p.name||'')+'</span><span class="post-handle">'+esc(p.handle||'')+'</span></div>'+
            icon+
          '</div>'+
          '<div class="post-body">'+esc(p.content||'')+'</div>'+
          '<div class="post-time">'+esc(p.time||'')+'</div>'+
        '</div>';
      }).join('');
      return '<div class="cluster">' +
        '<span class="cat-tag '+tag.cls+'">'+tag.label+'</span>' +
        '<div class="lead-headline" onclick="openArticle('+origIdx+')" style="cursor:pointer;">'+esc(c.leadHeadline)+'</div>' +
        '<div class="lead-source">'+esc(c.leadSource||'')+'</div>' +
        '<div class="lead-summary">'+esc(c.summary||'')+'</div>' +
        (posts ? '<div class="posts-label">Social reaction</div><div class="posts-list">'+posts+'</div>' : '') +
      '</div>';
    }).join('');
    var items = data.clusters.map(function(c){return c.leadHeadline;}).join('   ·   ');
    document.getElementById('ticker-inner').textContent = items+'   ·   '+items;
  }

  var FALLBACK_PICKS = [
    { matchup: 'Ottawa Senators @ Carolina Hurricanes', league: 'NHL', type: 'spread',
      when: 'Today 7:00 PM ET', pick: 'Hurricanes -1.5', odds: '-130',
      edge: 'Carolina 12-3 at home in playoffs last 3 seasons. Ottawa lost back-to-back road games and Andrei Svechnikov returning to form after injury.',
      confidence: 'high' },
    { matchup: 'Memphis Grizzlies @ OKC Thunder', league: 'NBA', type: 'moneyline',
      when: 'Today 9:30 PM ET', pick: 'Thunder ML', odds: '-450',
      edge: 'Thunder 6-0 straight up in playoffs. Ja Morant listed as questionable with hip issue. Memphis 1-8 SU as road underdog this series.',
      confidence: 'high' },
    { matchup: 'New York Yankees @ Baltimore Orioles', league: 'MLB', type: 'total',
      when: 'Today 7:05 PM ET', pick: 'Under 8.5', odds: '-112',
      edge: 'Both starters rank top-5 in ERA (Cole 2.41, Kremer 2.98). Night game, 48°F forecast, 12 mph wind blowing in — all run-suppressing.',
      confidence: 'medium' },
    { matchup: 'Detroit Pistons @ New York Knicks', league: 'NBA', type: 'player_prop',
      when: 'Today 7:30 PM ET', pick: 'Jalen Brunson Over 28.5 Points', odds: '-115',
      edge: 'Brunson averaging 31.8 PPG vs Detroit this season. Pistons 29th in defensive rating. Extended minutes expected in potential closeout game.',
      confidence: 'medium' },
    { matchup: 'Boston Celtics @ Miami Heat', league: 'NBA', type: 'first_half',
      when: 'Tomorrow 8:00 PM ET', pick: 'Celtics -3.5 (1H)', odds: '-108',
      edge: 'Boston 14-4 ATS in first halves as road favorite. Heat slow starters averaging -4.2 first-quarter margin over last 10 games.',
      confidence: 'medium' },
    { matchup: 'Philadelphia Phillies @ Chicago Cubs', league: 'MLB', type: 'player_prop',
      when: 'Tomorrow 2:20 PM ET', pick: 'Bryce Harper Over 1.5 Total Bases', odds: '-120',
      edge: 'Harper 14-for-31 (.452) career vs scheduled Cubs starter. Wrigley day game, wind blowing out 12+ mph — favorable park factor.',
      confidence: 'medium' },
  ];

  // ─── Pick grading: match picks against live ESPN scoreboard, compute W/L ───
  // Keeps a running daily record in localStorage indexed by date + pick id.
  // player_prop and first_half picks can't be graded from scoreboard data — they
  // stay "pending" (no badge shown).

  var PICK_LEAGUE_MAP = { NBA: 'nba', MLB: 'mlb', NHL: 'nhl', NFL: 'nfl' };
  var pickScoreboardCache = {};

  async function fetchScoreboardForPicks(leagueId) {
    var cached = pickScoreboardCache[leagueId];
    if (cached && Date.now() - cached.ts < 45 * 1000) return cached.events;
    var league = ESPN_LEAGUES.find(function(l){ return l.id === leagueId; });
    if (!league) return [];
    try {
      var res = await fetch(league.url, { signal: AbortSignal.timeout(6000) });
      if (!res.ok) return [];
      var data = await res.json();
      var events = data.events || [];
      pickScoreboardCache[leagueId] = { ts: Date.now(), events: events };
      return events;
    } catch (e) { return []; }
  }

  function normalizePickTeam(s) {
    return String(s||'').toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  // Extract the team name from a pick like "Nuggets ML" / "Avalanche -1.5" / "Knicks +3.5 (1H)"
  function extractTeamFromPickText(pickText) {
    var t = String(pickText||'').trim();
    t = t.replace(/\s*\(1H\).*/i, '');
    t = t.replace(/\s+ML\b.*/i, '');
    t = t.replace(/\s+(?:Over|Under)\s+[\d.]+.*/i, '');
    t = t.replace(/\s*[+-]\d+(?:\.\d+)?.*/, '');
    return t.trim();
  }

  function extractSpreadLine(pickText) {
    var m = String(pickText||'').match(/([+-])(\d+(?:\.\d+)?)/);
    if (!m) return null;
    return (m[1] === '+' ? 1 : -1) * parseFloat(m[2]);
  }

  function extractTotal(pickText) {
    var m = String(pickText||'').match(/(Over|Under)\s+([\d.]+)/i);
    if (!m) return null;
    return { side: m[1].toLowerCase(), line: parseFloat(m[2]) };
  }

  function competitorMatchesPick(competitor, pickTeamName) {
    var team = (competitor && competitor.team) || {};
    var espnNames = [team.displayName, team.name, team.shortDisplayName, team.abbreviation, team.location]
      .filter(Boolean).map(normalizePickTeam);
    var pickNorm = normalizePickTeam(pickTeamName);
    if (!pickNorm) return false;
    return espnNames.some(function(n){
      return n && (n.indexOf(pickNorm) !== -1 || pickNorm.indexOf(n) !== -1);
    });
  }

  function matchPickToEvent(pick, events) {
    if (!pick || !events || events.length === 0) return null;
    var matchup = String(pick.matchup||'');
    var mm = matchup.match(/^(.+?)\s+(?:@|vs\.?|at)\s+(.+?)$/i);
    var awayName = mm ? mm[1].trim() : '';
    var homeName = mm ? mm[2].trim() : '';
    var tbdRx = /\(opponent\s*tbd\)|\btbd\b/i;
    if (tbdRx.test(awayName)) awayName = '';
    if (tbdRx.test(homeName)) homeName = '';
    var pickTeam = extractTeamFromPickText(pick.pick);

    for (var i = 0; i < events.length; i++) {
      var ev = events[i];
      var comp = ev.competitions && ev.competitions[0];
      var competitors = (comp && comp.competitors) || [];
      if (competitors.length < 2) continue;
      var home = competitors.find(function(c){ return c.homeAway === 'home'; }) || competitors[0];
      var away = competitors.find(function(c){ return c.homeAway === 'away'; }) || competitors[1];

      if (awayName && homeName) {
        if (competitorMatchesPick(away, awayName) && competitorMatchesPick(home, homeName)) return ev;
        if (competitorMatchesPick(home, awayName) && competitorMatchesPick(away, homeName)) return ev;
      } else {
        var known = awayName || homeName || pickTeam;
        if (!known) continue;
        if (competitorMatchesPick(home, known) || competitorMatchesPick(away, known)) return ev;
      }
    }
    return null;
  }

  function getPickStatus(event) {
    var st = event && event.status && event.status.type;
    var name = st && st.name;
    var state = st && st.state;
    if (name === 'STATUS_IN_PROGRESS' || name === 'STATUS_HALFTIME' || name === 'STATUS_END_PERIOD' || state === 'in') return 'live';
    if (name === 'STATUS_FINAL' || name === 'STATUS_FULL_TIME' || state === 'post') return 'final';
    return 'scheduled';
  }

  function getPickResult(pick, event) {
    var type = (pick.type || '').toLowerCase();
    var comp = event.competitions && event.competitions[0];
    var competitors = (comp && comp.competitors) || [];
    if (competitors.length < 2) return null;
    var home = competitors.find(function(c){ return c.homeAway === 'home'; }) || competitors[0];
    var away = competitors.find(function(c){ return c.homeAway === 'away'; }) || competitors[1];
    var homeScore = parseInt(home.score) || 0;
    var awayScore = parseInt(away.score) || 0;
    var total = homeScore + awayScore;

    if (type === 'total') {
      var t = extractTotal(pick.pick);
      if (!t) return null;
      if (total > t.line) return t.side === 'over' ? 'win' : 'loss';
      if (total < t.line) return t.side === 'over' ? 'loss' : 'win';
      return 'push';
    }

    if (type === 'moneyline' || type === 'spread') {
      var pickTeam = extractTeamFromPickText(pick.pick);
      if (!pickTeam) return null;
      var isPickOnHome = competitorMatchesPick(home, pickTeam);
      var isPickOnAway = competitorMatchesPick(away, pickTeam);
      if (!isPickOnHome && !isPickOnAway) return null;
      var pickedScore = isPickOnHome ? homeScore : awayScore;
      var otherScore  = isPickOnHome ? awayScore : homeScore;
      var margin = pickedScore - otherScore;

      if (type === 'moneyline') {
        if (margin > 0) return 'win';
        if (margin < 0) return 'loss';
        return 'push';
      }
      // spread
      var line = extractSpreadLine(pick.pick);
      if (line === null) return null;
      var adj = margin + line;
      if (adj > 0) return 'win';
      if (adj < 0) return 'loss';
      return 'push';
    }

    return null; // player_prop, first_half — can't grade from scoreboard
  }

  // Stable identifier for a pick (survives pick-list refreshes)
  function pickId(p) {
    return String((p.matchup || '') + '|' + (p.pick || '')).replace(/\s+/g, '').toLowerCase();
  }

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' +
           String(d.getMonth()+1).padStart(2,'0') + '-' +
           String(d.getDate()).padStart(2,'0');
  }

  function loadPickHistory() {
    try { return JSON.parse(localStorage.getItem('sb_pick_history') || '{}'); }
    catch(e) { return {}; }
  }

  function savePickResult(pick, result) {
    if (result !== 'win' && result !== 'loss' && result !== 'push') return;
    var hist = loadPickHistory();
    var day = todayStr();
    if (!hist[day]) hist[day] = {};
    hist[day][pickId(pick)] = { result: result, matchup: pick.matchup, pick: pick.pick, savedAt: Date.now() };
    // Prune to last 30 days
    var keys = Object.keys(hist).sort();
    while (keys.length > 30) delete hist[keys.shift()];
    try { localStorage.setItem('sb_pick_history', JSON.stringify(hist)); } catch(e) {}
  }

  function getTodayRecord() {
    var hist = loadPickHistory();
    var day = hist[todayStr()] || {};
    var w = 0, l = 0, p = 0;
    Object.keys(day).forEach(function(k){
      if (day[k].result === 'win')  w++;
      if (day[k].result === 'loss') l++;
      if (day[k].result === 'push') p++;
    });
    return { wins: w, losses: l, pushes: p };
  }

  function getAllTimeRecord() {
    var hist = loadPickHistory();
    var w = 0, l = 0, p = 0;
    Object.keys(hist).forEach(function(d){
      Object.keys(hist[d]).forEach(function(k){
        if (hist[d][k].result === 'win')  w++;
        if (hist[d][k].result === 'loss') l++;
        if (hist[d][k].result === 'push') p++;
      });
    });
    return { wins: w, losses: l, pushes: p };
  }

  function renderRecordStrip(liveCount, pendingCount) {
    var el = document.getElementById('picks-record-strip');
    if (!el) return;
    var today = getTodayRecord();
    var all   = getAllTimeRecord();
    var sep = '<span class="picks-record-sep">·</span>';
    var parts = ['<span class="picks-record-label">Value picks</span>'];

    if (liveCount > 0) {
      parts.push(sep);
      parts.push('<span class="picks-record-live">● ' + liveCount + ' LIVE</span>');
    }
    if (today.wins || today.losses || today.pushes) {
      parts.push(sep);
      parts.push('Today: <span class="picks-record-wins">' + today.wins + 'W</span>–<span class="picks-record-losses">' + today.losses + 'L</span>' +
        (today.pushes ? '–<span class="picks-record-push">' + today.pushes + 'P</span>' : ''));
    }
    if (all.wins || all.losses) {
      var totalPicks = all.wins + all.losses + all.pushes;
      var winPct = totalPicks > 0 ? Math.round((all.wins / (all.wins + all.losses || 1)) * 100) : 0;
      parts.push(sep);
      parts.push('All-time: <span class="picks-record-wins">' + all.wins + 'W</span>–<span class="picks-record-losses">' + all.losses + 'L</span>' +
        (all.pushes ? '–<span class="picks-record-push">' + all.pushes + 'P</span>' : '') +
        ' (' + winPct + '%)');
    }
    if (pendingCount > 0) {
      parts.push(sep);
      parts.push(pendingCount + ' pending');
    }
    el.innerHTML = parts.join(' ');
  }

  function updatePickStatusBadge(idx, status, result) {
    var badge = document.querySelector('[data-pick-idx="' + idx + '"] .pick-status');
    if (!badge) return;
    if (status === 'live') {
      badge.className = 'pick-status badge-live';
      badge.textContent = '● LIVE';
    } else if (status === 'final' && result) {
      var cls = result === 'win' ? 'badge-won' : result === 'loss' ? 'badge-lost' : 'badge-push';
      badge.className = 'pick-status ' + cls;
      badge.textContent = result === 'push' ? 'PUSH' : result === 'win' ? 'WON' : 'LOST';
    } else {
      badge.className = 'pick-status';
      badge.textContent = '';
    }
  }

  // After rendering picks, asynchronously fetch scoreboards for each pick's league,
  // match picks to events, and update badges + record strip in place.
  async function enrichPicksWithStatus(picks) {
    var leagues = Array.from(new Set(picks.map(function(p){
      return PICK_LEAGUE_MAP[(p.league || '').toUpperCase()];
    }))).filter(Boolean);
    if (leagues.length === 0) { renderRecordStrip(0, picks.length); return; }

    var boards = await Promise.all(leagues.map(fetchScoreboardForPicks));
    var eventsByLeague = {};
    leagues.forEach(function(lg, i){ eventsByLeague[lg] = boards[i]; });

    var liveCount = 0, pendingCount = 0;
    picks.forEach(function(pick, idx) {
      var lg = PICK_LEAGUE_MAP[(pick.league || '').toUpperCase()];
      if (!lg) { pendingCount++; return; }
      var events = eventsByLeague[lg] || [];
      var event = matchPickToEvent(pick, events);
      if (!event) { pendingCount++; return; }
      var status = getPickStatus(event);
      var result = null;
      if (status === 'final') {
        result = getPickResult(pick, event);
        if (result) savePickResult(pick, result);
      }
      if (status === 'live') liveCount++;
      if (status === 'scheduled' || (status === 'final' && !result)) pendingCount++;
      updatePickStatusBadge(idx, status, result);
    });

    renderRecordStrip(liveCount, pendingCount);
  }

  function renderHighlightsFeed() {

  function toggleDraftTracker() {
    var banner = document.getElementById('draft-tracker');
    if (!banner) return;
    var isExpanded = banner.classList.contains('expanded');
    var nextExpanded = !isExpanded;
    banner.classList.toggle('expanded', nextExpanded);
    banner.classList.toggle('collapsed', !nextExpanded);
    localStorage.setItem('sb_draft_expanded', nextExpanded ? '1' : '0');
    var label = banner.querySelector('.dt-toggle-label');
    if (label) label.textContent = nextExpanded ? 'Hide' : 'View all';
  }

  // ─── Client-side ESPN draft feed (real-time during active draft) ──────────
  // Fetches directly from ESPN Core API so picks appear in the browser without
  // waiting for the 2-hour cron. Mirrors the server-side fetchNflDraftLive()
  // logic. Caches for 60s, polls every 90s while banner is showing.
  var liveDraftCache = { ts: 0, data: null };
  var LIVE_DRAFT_TTL_MS = 60 * 1000;
  var draftTimer = null;

  async function fetchLiveDraft() {
    if (liveDraftCache.data && Date.now() - liveDraftCache.ts < LIVE_DRAFT_TTL_MS) {
      return liveDraftCache.data;
    }
    var year = new Date().getFullYear();
    var candidates = [year, year - 1];

    async function fetchJson(url) {
      try {
        var r = await fetch(url.replace(/^http:/, 'https:'), { signal: AbortSignal.timeout(8000) });
        if (!r.ok) return null;
        return await r.json();
      } catch (e) { return null; }
    }

    var rounds = null, pickedYear = null;
    for (var i = 0; i < candidates.length; i++) {
      var y = candidates[i];
      var url = 'https://sports.core.api.espn.com/v2/sports/football/leagues/nfl/seasons/' + y + '/draft/rounds?limit=300';
      console.log('[draft] fetching', url);
      var data = await fetchJson(url);
      if (!data || !Array.isArray(data.items)) { console.warn('[draft] no rounds for', y); continue; }
      var totalListed = data.items.reduce(function(n, r){ return n + (Array.isArray(r.picks) ? r.picks.length : 0); }, 0);
      console.log('[draft] year', y, ':', data.items.length, 'rounds,', totalListed, 'picks listed');
      if (totalListed > 0) { rounds = data; pickedYear = y; break; }
    }
    if (!rounds) { console.warn('[draft] all years empty'); return null; }

    // Filter by ref-presence (permissive) rather than status name
    var rawPicks = [];
    for (var r = 0; r < rounds.items.length; r++) {
      var round = rounds.items[r];
      var roundNum = round.number || 1;
      var picks = round.picks;
      if (picks && picks.$ref && !Array.isArray(picks)) {
        var sub = await fetchJson(picks.$ref);
        picks = sub && sub.items || [];
      }
      if (!Array.isArray(picks)) continue;
      for (var j = 0; j < picks.length; j++) {
        var p = picks[j];
        if (p && p.$ref && !p.status && !p.overall) {
          p = await fetchJson(p.$ref);
          if (!p) continue;
        }
        var teamRef    = p && p.team    && p.team.$ref;
        var athleteRef = p && p.athlete && p.athlete.$ref;
        if (teamRef && athleteRef) {
          rawPicks.push({
            pick:       p.overall || p.pick || null,
            round:      roundNum,
            teamRef:    teamRef,
            athleteRef: athleteRef,
            tradeNote:  p.tradeNote || '',
          });
        }
      }
    }
    console.log('[draft] pickable:', rawPicks.length);
    if (rawPicks.length === 0) {
      var emptyOut = { active: false, event: '', picks: [], source: 'espn' };
      liveDraftCache = { ts: Date.now(), data: emptyOut };
      return emptyOut;
    }

    var resolved = [];
    var BATCH = 12;
    for (var bi = 0; bi < rawPicks.length; bi += BATCH) {
      var batch = rawPicks.slice(bi, bi + BATCH);
      var results = await Promise.all(batch.map(async function(p) {
        var teamP    = p.teamRef    ? fetchJson(p.teamRef)    : null;
        var athleteP = p.athleteRef ? fetchJson(p.athleteRef) : null;
        var team = await teamP, ath = await athleteP;
        var playerName = '';
        if (ath) {
          playerName = ath.fullName || ath.displayName || '';
          if (!playerName && (ath.firstName || ath.lastName)) {
            playerName = ((ath.firstName||'') + ' ' + (ath.lastName||'')).trim();
          }
        }
        return {
          pick:     p.pick,
          round:    p.round,
          team:     team ? (team.displayName || team.name || team.shortDisplayName || '') : '',
          player:   playerName,
          position: ath && ath.position ? (ath.position.abbreviation || ath.position.name || '') : '',
          school:   ath && ath.college  ? (ath.college.name || '') : '',
          note:     p.tradeNote ? 'Trade: ' + p.tradeNote : '',
        };
      }));
      resolved = resolved.concat(results);
    }

    var clean = resolved.filter(function(p) { return p && p.team && p.player; });
    clean.sort(function(a,b){ return (a.pick||999) - (b.pick||999); });
    console.log('[draft] resolved', clean.length, 'picks with names');

    var out = {
      active: clean.length > 0,
      event:  pickedYear + ' NFL Draft',
      picks:  clean,
      source: 'espn',
    };
    liveDraftCache = { ts: Date.now(), data: out };
    return out;
  }

  async function refreshDraftTracker() {
    var live = await fetchLiveDraft();
    if (live && live.picks && live.picks.length > 0) {
      renderDraftTracker({ draftTracker: live });
    } else if (allData && allData.draftTracker && allData.draftTracker.active) {
      // Server-side generate.js already populated draftTracker in stories.json
      // — either from its own ESPN fetch or from news extraction. Render as-is
      // but ensure source is labeled if missing.
      var fallback = Object.assign({}, allData.draftTracker);
      if (!fallback.source) fallback.source = 'news';
      renderDraftTracker({ draftTracker: fallback });
    } else {
      renderDraftTracker({ draftTracker: { active: false, picks: [] } });
    }
    // Poll while banner is visible — picks trickle in every few minutes during a live round
    var banner = document.getElementById('draft-tracker');
    var visible = banner && banner.style.display !== 'none';
    if (visible && !draftTimer) {
      draftTimer = setInterval(refreshDraftTracker, 90 * 1000);
    } else if (!visible && draftTimer) {
      clearInterval(draftTimer); draftTimer = null;
    }
  }

  async function loadStories() {
    var btn = document.getElementById('refresh-btn');
    if (btn) { btn.disabled = true; btn.classList.add('spinning'); }
    try {
      var res = await fetch('stories.json?nc=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      if (!data || !data.clusters || data.clusters.length === 0) throw new Error('empty');
      allData = data;
      if (data.poll && data.poll.question) {
        var prevQ = localStorage.getItem('sb_poll_question');
        if (prevQ !== data.poll.question) { localStorage.removeItem('sb_poll_v1'); localStorage.setItem('sb_poll_question', data.poll.question); }
        POLL = data.poll;
      }
      if (Array.isArray(data.picks) && data.picks.length) PICKS = data.picks;
      if (Array.isArray(data.predictions) && data.predictions.length) PREDICTIONS = data.predictions;
      if (Array.isArray(data.highlights) && data.highlights.length) HIGHLIGHTS = data.highlights;
      if (activeCat === 'analytics') renderActiveSub();
      else renderFeed(allData);
      renderSidebar(allData);
      refreshDraftTracker();
      renderWidget();
      var t = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
      document.getElementById('updated-label').textContent = 'Feed updated ' + t + ' · auto-refreshes every 2h';
      if (typeof renderTicker === 'function') renderTicker(allData);
    } catch(err) {
      console.warn('loadStories error:', err.message);
      if (allData) {
        if (activeCat === 'analytics') renderActiveSub();
        else renderFeed(allData);
      } else {
        document.getElementById('main-feed').innerHTML = '<div class="loading-state"><div class="loading-title">Loading stories...</div><div class="loading-sub">If this persists, go to GitHub Actions and run the Refresh Stories workflow.</div></div>';
      }
    } finally {
      var btn2 = document.getElementById('refresh-btn');
      if (btn2) { btn2.disabled = false; btn2.classList.remove('spinning'); }
    }
  }
  async function fetchScores(leagueId) {
    activeLeague = leagueId;
    // Update tab active state for main-feed tabs
    document.querySelectorAll('.main-score-tab').forEach(function(t){
      var lg = ESPN_LEAGUES.find(function(l){return l.id===leagueId;});
      t.classList.toggle('active', lg && t.textContent === lg.label);
    });
    var el = document.getElementById('scores-games');
    if (!el) return;

    // Serve from short-lived cache (5 min)
    var cached = scoresCache[leagueId];
    if (cached && Date.now() - cached.ts < 300000) { el.innerHTML = cached.html; return; }

    el.innerHTML = '<div class="score-loading">Loading scores...</div>';
    try {
      var league = ESPN_LEAGUES.find(function(l){return l.id===leagueId;});
      var res  = await fetch(league.url);
      var data = await res.json();
      var events = data.events || [];
      if (events.length === 0) { el.innerHTML = '<div class="score-loading">No games today.</div>'; return; }

      var html = events.slice(0, 12).map(function(ev) {
        var comp   = ev.competitions[0];
        var teams  = comp.competitors;
        var home   = teams.find(function(t){return t.homeAway==='home';}) || teams[0];
        var away   = teams.find(function(t){return t.homeAway==='away';}) || teams[1];
        var status = ev.status;
        var stateType = status.type.name; // STATUS_FINAL, STATUS_IN_PROGRESS, STATUS_SCHEDULED
        var statusTxt, isLive = false;
        if (stateType === 'STATUS_FINAL') {
          statusTxt = status.type.shortDetail || 'Final';
        } else if (stateType === 'STATUS_IN_PROGRESS') {
          statusTxt = status.displayClock ? (status.period ? 'Q'+status.period+' ' : '') + status.displayClock : 'Live';
          isLive = true;
        } else {
          var d = new Date(ev.date);
          statusTxt = d.toLocaleDateString('en-US',{weekday:'short'}) + ' ' +
                      d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        }
        var hScore = parseInt(home.score) || 0;
        var aScore = parseInt(away.score) || 0;
        var hWin = stateType==='STATUS_FINAL' && hScore > aScore;
        var aWin = stateType==='STATUS_FINAL' && aScore > hScore;
        var hName = home.team.shortDisplayName || home.team.abbreviation || '';
        var aName = away.team.shortDisplayName || away.team.abbreviation || '';
        var hDisp = stateType==='STATUS_SCHEDULED' ? '' : hScore;
        var aDisp = stateType==='STATUS_SCHEDULED' ? '' : aScore;
        return '<div class="main-score-card">'+
          '<div class="main-score-row '+(aWin?'winner':'')+'"><span class="main-score-team">'+esc(aName)+'</span><span class="main-score-num">'+aDisp+'</span></div>'+
          '<div class="main-score-row '+(hWin?'winner':'')+'"><span class="main-score-team">'+esc(hName)+'</span><span class="main-score-num">'+hDisp+'</span></div>'+
          '<div class="main-score-footer'+(isLive?' live':'')+'">'+esc(statusTxt)+'</div>'+
        '</div>';
      }).join('');

      scoresCache[leagueId] = { html: html, ts: Date.now() };
      el.innerHTML = html;
    } catch(err) {
      el.innerHTML = '<div class="score-loading">Could not load scores.</div>';
    }
  }


  setDateline();
  setInterval(setDateline, 60000);
  renderWidget();
  renderPicksFeed();
  loadStories();
  refreshDraftTracker();  // parallel with stories.json — live ESPN data doesn't need to wait
</script>

  <div style="position:relative;width:90%;max-width:900px;aspect-ratio:16/9;" onclick="event.stopPropagation()">
