<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsBizNow! — Sports Industry News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Base surfaces — layered dark, each step slightly lighter than the last */
    --bg: #0a0c11;           /* page background (the "canvas") */
    --surface: #14171e;      /* cards, toolbar, widgets — one step up from bg */
    --surface-2: #1d2028;    /* elevated / hover states — two steps up */

    /* The deepest black — reserved for the header, ticker, draft tracker:
       visually distinct horizontal bands that frame the content. */
    --ink-deep: #05070a;

    /* Text hierarchy — ink is the brightest text color. High contrast but
       not pure white (avoids that harsh "OLED glare" look). */
    --ink: #edefe8;
    --ink-2: #a5abb5;
    --ink-3: #7d828d;

    /* Dividers — subtle on dark, stronger variant for emphasis */
    --rule: #252a33;
    --rule-strong: #363c48;

    /* Signature accent — electric lime, reads brilliantly on dark */
    --accent: #caff3f;
    --accent-dim: #a8d420;
    --accent-ink: #0a1400;   /* dark text on accent backgrounds */

    /* Semantic colors — slightly brighter than light-mode versions so they
       pop on the dark canvas. The "light" variants are now translucent
       tints that layer cleanly on any dark surface. */
    --green: #22c55e;        --green-light: rgba(34,197,94,0.14);
    --amber: #f59e0b;        --amber-light: rgba(245,158,11,0.14);
    --blue:  #60a5fa;        --blue-light:  rgba(96,165,250,0.14);
    --purple:#c084fc;        --purple-light:rgba(192,132,252,0.14);
    --red:   #f87171;        --red-light:   rgba(248,113,113,0.14);
  }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.55;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .site-header { background: var(--ink-deep); color: #fff; padding: 0 24px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .logo {
    font-family: 'Archivo', sans-serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.035em;
    line-height: 0.95;
    color: #fff;
    font-style: italic;
    text-transform: lowercase;
  }
  .logo em { color: var(--accent); font-style: italic; }
  .logo-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
    font-weight: 500;
  }
  .header-dateline { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.5); text-align: right; letter-spacing: .04em; line-height: 1.4; }
  .nav-bar { display: flex; align-items: center; gap: 2px; padding: 10px 0; overflow-x: auto; scrollbar-width: none; }
  .nav-bar::-webkit-scrollbar { display: none; }
  .nav-pill {
    font-family: 'Archivo', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .04em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.12);
    cursor: pointer;
    background: transparent;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    transition: all .12s ease;
  }
  .nav-pill:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.3); }
  .nav-pill.active {
    background: var(--accent);
    color: var(--accent-ink);
    border-color: var(--accent);
  }
  .nav-chev { display: inline-block; font-size: 8px; margin-left: 4px; opacity: 0.7; transition: transform .15s; }
  .nav-pill.active .nav-chev { transform: rotate(180deg); opacity: 1; }
  .subnav-bar { display: none; align-items: center; gap: 6px; padding: 10px 0 12px; border-top: 1px solid rgba(255,255,255,0.06); }
  .subnav-bar.open { display: flex; }
  .subnav-prefix { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.3); margin-right: 4px; letter-spacing: 0; }
  .subnav-pill {
    font-family: 'Archivo', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 2px;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    background: transparent;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    transition: all .12s ease;
  }
  .subnav-pill:hover { border-color: rgba(255,255,255,0.4); color: #fff; }
  .subnav-pill.active {
    background: rgba(202,255,63,0.14);
    color: var(--accent);
    border-color: var(--accent);
  }
  .ticker-wrap {
    background: var(--ink-deep);
    border-top: 1px solid var(--accent);
    overflow: hidden;
    white-space: nowrap;
    padding: 7px 0;
  }
  .ticker-inner {
    display: inline-block;
    animation: ticker 120s linear infinite;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.85);
    letter-spacing: .04em;
  }
  .ticker-inner .ticker-sep { color: var(--accent); margin: 0 10px; font-weight: 600; }
  @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
  .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid var(--rule); background: var(--surface); }
  .updated-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); letter-spacing: .04em; }
  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Archivo', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 2px;
    border: 1px solid var(--rule-strong);
    cursor: pointer;
    background: var(--surface);
    color: var(--ink-2);
    transition: all .12s;
  }
  .refresh-btn:hover { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .refresh-btn:disabled { opacity: .5; cursor: not-allowed; }
  .refresh-btn.spinning svg { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .page { max-width: 1100px; margin: 0 auto; padding: 20px 24px 40px; display: grid; grid-template-columns: 1fr 260px; gap: 28px; align-items: start; }
  @media (max-width: 760px) { .page { grid-template-columns: 1fr; } }
  .loading-state { text-align: center; padding: 60px 0; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--rule); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
  .loading-title { font-size: 13px; font-weight: 600; color: var(--ink-2); }
  .loading-step  { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3); margin-top: 5px; }
  .error-box { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25); border-radius: 3px; padding: 24px; }
  .error-box h3 { font-size: 14px; color: var(--red); margin-bottom: 6px; }
  .error-box p  { font-size: 12px; color: var(--ink-2); line-height: 1.6; }
  .try-again-btn { margin-top: 14px; display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--rule); cursor: pointer; background: var(--surface); color: var(--ink-2); font-family: 'Inter', sans-serif; }
  .main-feed { display: flex; flex-direction: column; }
  .cluster { padding: 18px 0; border-bottom: 1px solid var(--rule); }
  .cluster:first-child { padding-top: 4px; }
  .cat-tag {
    display: inline-block;
    font-family: 'Archivo', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px;
    margin-bottom: 9px;
  }
  .tag-media     { background: var(--green-light);  color: var(--green);  }
  .tag-contracts { background: var(--amber-light);  color: var(--amber);  }
  .tag-leagues   { background: var(--blue-light);   color: var(--blue);   }
  .tag-revenue   { background: var(--purple-light); color: var(--purple); }
  .tag-labor     { background: var(--red-light);    color: var(--red);    }
  .tag-default   { background: var(--surface-2); color: var(--ink-3); }
  .lead-headline {
    font-family: 'Archivo', sans-serif;
    font-size: 22px; font-weight: 800;
    line-height: 1.2;
    letter-spacing: -0.015em;
    color: var(--ink);
    transition: color .12s; text-decoration: none; display: block;
  }
  .lead-headline:hover { color: var(--accent); }
  .lead-source { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 6px; letter-spacing: .03em; }
  .lead-summary { font-size: 14px; color: var(--ink-2); margin-top: 9px; line-height: 1.6; max-width: 95%; }
  /* ARTICLE MODAL */
  .article-modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto; }
  .article-modal { background:var(--surface);max-width:680px;width:100%;border-radius:4px;padding:32px;position:relative;margin:auto; }
  .article-modal-close { position:absolute;top:14px;right:16px;font-size:20px;cursor:pointer;color:var(--ink-3);background:none;border:none;line-height:1; }
  .article-modal-close:hover { color:var(--ink); }
  .article-modal-tag { display:inline-block;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:10px; }
  .article-modal-headline { font-family:'Archivo',sans-serif;font-size:26px;font-weight:800;line-height:1.2;letter-spacing:-0.02em;color:var(--ink);margin-bottom:8px; }
  .article-modal-meta { font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-3);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--rule); }
  .article-modal-body { font-size:15px;color:var(--ink-2);line-height:1.75; }
  .article-modal-body p { margin-bottom:14px; }

  .posts-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3); margin-top: 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .posts-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .posts-list { display: flex; flex-direction: column; gap: 6px; }
  .post-card { background: var(--surface-2); border: 1px solid var(--rule); border-radius: 3px; padding: 10px 12px; text-decoration: none; display: block; transition: border-color .12s, background .12s; }
  .post-card:hover { border-color: var(--rule-strong); background: var(--surface); }
  .post-header { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .post-avatar { width: 22px; height: 22px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; color: var(--accent-ink); background: var(--accent); font-family: 'Archivo', sans-serif; letter-spacing: .02em; }
  .post-meta { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .post-handle { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-sentiment {
    font-family: 'Archivo', sans-serif;
    font-size: 9px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    padding: 1px 6px;
    border: 1px solid;
    border-radius: 2px;
    white-space: nowrap;
  }
  .post-body { font-size: 12px; color: var(--ink-2); line-height: 1.5; }
  .sidebar { display: flex; flex-direction: column; }
  .sidebar-section { margin-bottom: 22px; }
  .sidebar-heading {
    font-family: 'Archivo', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink);
    border-bottom: 2px solid var(--accent);
    padding-bottom: 7px; margin-bottom: 12px;
  }
  .sidebar-item { display: flex; gap: 9px; align-items: flex-start; padding: 9px 0; border-bottom: 1px solid var(--rule); text-decoration: none; transition: opacity .12s; }
  .sidebar-item:last-child { border-bottom: none; }
  .sidebar-item:hover { opacity: .7; }
  .sb-dot  { flex-shrink: 0; width: 6px; height: 6px; border-radius: 1px; background: var(--accent-dim); margin-top: 6px; }
  .sb-text { font-size: 12px; color: var(--ink); line-height: 1.45; font-weight: 500; }
  .sb-src  { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 3px; font-weight: 400; }
  .sidebar-promo {
    border: 1px dashed var(--rule-strong);
    border-radius: 2px;
    padding: 14px; text-align: center;
    color: var(--ink-3); font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .widget-box {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-top: 3px solid var(--accent);
    margin-bottom: 28px;
  }
  .widget-header { padding: 12px 14px 10px; border-bottom: 1px solid var(--rule); }
  .widget-title {
    font-family: 'Archivo', sans-serif;
    font-size: 14px; font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--ink);
    display: block;
  }
  .widget-switcher { display: flex; gap: 3px; }
  .widget-type-btn { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--rule); cursor: pointer; background: transparent; color: var(--ink-3); font-family: 'Inter', sans-serif; transition: all .12s; white-space: nowrap; }
  .widget-type-btn:hover  { background: var(--rule); color: var(--ink-2); }
  .widget-type-btn.active { background: var(--ink-deep); color: #fff; border-color: var(--ink); }
  .widget-body { padding: 14px; }
  .poll-question { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.4; margin-bottom: 12px; }
  .poll-option { margin-bottom: 7px; }
  .poll-option-btn { width: 100%; text-align: left; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--rule); background: var(--bg); cursor: pointer; font-size: 12px; color: var(--ink-2); font-family: 'Inter', sans-serif; transition: all .12s; }
  .poll-option-btn:hover  { border-color: var(--green); color: var(--green); background: var(--green-light); }
  .poll-result { margin-bottom: 8px; }
  .poll-result-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-2); margin-bottom: 3px; }
  .poll-result-pct { font-weight: 600; color: var(--ink); }
  .poll-bar-track { height: 5px; background: var(--rule); border-radius: 3px; overflow: hidden; }
  .poll-bar-fill  { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s ease; }
  .poll-bar-fill.winner { background: var(--accent); }
  .poll-meta  { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 10px; }
  .poll-reset { font-size: 10px; color: var(--ink-3); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: 'Inter', sans-serif; margin-left: 8px; }
  .score-league { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
  .score-game { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--rule); }
  .score-game:last-child { border-bottom: none; }
  .score-teams { flex: 1; }
  .score-team { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--ink-2); line-height: 1.7; }
  .score-team.winner { font-weight: 600; color: var(--ink); }
  .score-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; min-width: 28px; text-align: right; }
  .score-status { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-3); text-align: center; padding: 0 8px; white-space: nowrap; }
  .score-status.live { color: var(--red); font-weight: 600; }
  .score-tabs { display: flex; gap: 3px; margin-bottom: 10px; }
  .score-tab { font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--rule); cursor: pointer; background: transparent; color: var(--ink-3); font-family: 'Inter', sans-serif; transition: all .12s; }
  .score-tab:hover { background: var(--rule); }
  .score-tab.active { background: var(--ink-deep); color: #fff; border-color: var(--ink); }
  .score-loading { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3); padding: 12px 0; text-align: center; }
  .widget-blank { text-align: center; padding: 20px 0; }
  .picks-disclaimer { font-size: 9px; color: var(--ink-3); margin-top: 10px; font-family: JetBrains Mono, monospace; }
  .widget-blank-text { font-size: 12px; color: var(--ink-3); line-height: 1.6; }

  /* ─── Pick status badges (live/won/lost/push) and daily record strip ─── */
  .pick-status { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; }
  .pick-status.badge-live { background: rgba(26,122,69,0.15); color: var(--green); animation: dt-pulse 1.6s infinite; }
  .pick-status.badge-won  { background: var(--green); color: #fff; }
  .pick-status.badge-lost { background: var(--red); color: #fff; }
  .pick-status.badge-push { background: var(--ink-3); color: #fff; }

  /* Scoreboard-style record card. Click to open the history modal. */
  .picks-record-strip {
    position: relative;
    display: flex; align-items: center; flex-wrap: wrap; gap: 0;
    margin-bottom: 20px;
    padding: 0;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    font-family: 'Inter', sans-serif;
    min-height: 68px;
  }
  .picks-record-strip:hover { border-color: var(--rule-strong); }
  .picks-record-strip.is-overall { border-left: 3px solid var(--accent); }
  .picks-record-strip[data-empty="1"] { cursor: default; opacity: 0.6; }
  .picks-record-strip[data-empty="1"]:hover { border-color: var(--rule); }

  /* The coloured progress bar showing hit rate, painted along the bottom edge. */
  .picks-record-strip::after {
    content: '';
    position: absolute; bottom: 0; left: 0;
    height: 2px;
    background: var(--accent);
    width: var(--winpct, 0%);
    transition: width .4s ease;
    opacity: 0.85;
  }

  .prs-cell {
    display: flex; flex-direction: column; gap: 2px;
    padding: 12px 18px;
    border-right: 1px solid var(--rule);
    min-width: 0;
  }
  .prs-cell:last-of-type { border-right: none; }
  .prs-cell-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500;
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-3);
    line-height: 1;
  }
  .prs-cell-value {
    font-family: 'Archivo', sans-serif;
    font-size: 17px; font-weight: 800;
    letter-spacing: -0.005em;
    color: var(--ink);
    line-height: 1.1;
  }
  .prs-cell-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--ink-3);
    line-height: 1;
  }
  .prs-cell-title {
    padding: 12px 20px;
    border-right: 1px solid var(--rule);
    display: flex; flex-direction: column; gap: 4px;
    min-width: 150px;
  }
  .prs-title-main {
    font-family: 'Archivo', sans-serif;
    font-size: 13px; font-weight: 800;
    letter-spacing: .02em; text-transform: uppercase;
    color: var(--ink);
  }
  .prs-title-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: .04em;
  }
  .prs-live-pip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 6px;
    background: rgba(34,197,94,0.12);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700;
    letter-spacing: .1em;
    border-radius: 2px;
    animation: dt-pulse 2s infinite;
  }
  .prs-w  { color: var(--green); }
  .prs-l  { color: var(--red); }
  .prs-p  { color: var(--ink-3); }
  .prs-pct-good { color: var(--accent); }
  .prs-pct-bad  { color: var(--red); }
  .prs-pct-even { color: var(--ink-2); }
  .prs-expand {
    margin-left: auto; padding: 12px 18px;
    font-family: 'Archivo', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink-3);
    display: flex; align-items: center; gap: 6px;
  }
  .picks-record-strip:hover .prs-expand { color: var(--accent); }
  .prs-expand-chev { font-size: 8px; }

  /* Legacy record-strip variables kept for back-compat text */
  .picks-record-label { color: var(--ink-2); font-weight: 600; }
  .picks-record-wins { color: var(--green); font-weight: 700; }
  .picks-record-losses { color: var(--red); font-weight: 700; }
  .picks-record-push { color: var(--ink-3); font-weight: 600; }
  .picks-record-live { color: var(--green); font-weight: 700; animation: dt-pulse 1.6s infinite; }
  .picks-record-sep { color: var(--rule); }

  /* ─── Pick History Modal — opens when user clicks a record strip ─── */
  .ph-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 3000;
    display: none;
    align-items: flex-start; justify-content: center;
    overflow-y: auto;
    padding: 40px 20px;
    backdrop-filter: blur(4px);
  }
  .ph-overlay.open { display: flex; }
  .ph-modal {
    background: var(--surface);
    border: 1px solid var(--rule-strong);
    border-radius: 6px;
    width: 100%; max-width: 760px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
  }
  .ph-header {
    padding: 20px 24px;
    background: var(--ink-deep);
    border-bottom: 2px solid var(--accent);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .ph-title {
    font-family: 'Archivo', sans-serif;
    font-size: 20px; font-weight: 800;
    letter-spacing: -0.015em;
    color: #fff;
    flex: 1;
  }
  .ph-title-sport {
    color: var(--accent);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 4px;
  }
  .ph-close {
    font-family: 'Archivo', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: #fff;
    border-radius: 2px;
    cursor: pointer;
    transition: all .15s;
  }
  .ph-close:hover { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .ph-stats-bar {
    display: flex; padding: 0; background: var(--ink-deep);
    border-bottom: 1px solid var(--rule);
  }
  .ph-stat {
    flex: 1; padding: 14px 20px;
    border-right: 1px solid rgba(255,255,255,0.06);
    text-align: center;
  }
  .ph-stat:last-child { border-right: none; }
  .ph-stat-value {
    font-family: 'Archivo', sans-serif;
    font-size: 24px; font-weight: 900;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .ph-stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500;
    letter-spacing: .14em; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-top: 6px;
  }
  .ph-body { padding: 20px 24px 24px; max-height: 60vh; overflow-y: auto; }
  .ph-day-group { margin-bottom: 22px; }
  .ph-day-group:last-child { margin-bottom: 0; }
  .ph-day-label {
    font-family: 'Archivo', sans-serif;
    font-size: 11px; font-weight: 800;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--ink);
    padding-bottom: 6px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .ph-day-summary {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    margin-left: 10px;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 500;
  }
  .ph-entry {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--rule);
  }
  .ph-entry:last-child { border-bottom: none; }
  .ph-entry-badge {
    flex-shrink: 0; width: 48px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    padding: 3px 0; text-align: center;
    border-radius: 2px;
  }
  .ph-entry-badge.won  { background: var(--green); color: #fff; }
  .ph-entry-badge.lost { background: var(--red); color: #fff; }
  .ph-entry-badge.push { background: var(--ink-3); color: #fff; }
  .ph-entry-body { flex: 1; min-width: 0; }
  .ph-entry-pick {
    font-family: 'Archivo', sans-serif;
    font-size: 14px; font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
  }
  .ph-entry-matchup {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    margin-top: 3px;
    letter-spacing: .03em;
  }
  .ph-empty {
    padding: 30px 20px; text-align: center;
    color: var(--ink-3);
    font-size: 13px;
  }

  /* Sport-section header with its own record strip sitting beneath. */
  .picks-sport-section { margin-top: 28px; }
  .picks-sport-section:first-of-type { margin-top: 0; }
  .picks-sport-header {
    display: flex; align-items: center; gap: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 4px;
  }
  .picks-sport-label {
    font-family: 'Archivo', sans-serif;
    font-size: 16px; font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  .picks-sport-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Live/final score+clock readout displayed beneath each graded pick */
  .pick-live-readout {
    display: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink);
    margin-top: 2px;
    margin-bottom: 10px;
    padding: 7px 11px;
    background: rgba(202,255,63,0.06);
    border-left: 2px solid var(--accent);
    border-radius: 0 2px 2px 0;
    letter-spacing: 0.02em;
    line-height: 1.4;
  }

  /* ─── Draft Tracker Banner ─── */
  .draft-tracker {
    background: var(--ink-deep);
    color: #fff;
    padding: 14px 24px;
    border-bottom: 2px solid var(--accent);
    transition: padding .2s ease;
    position: relative;
  }
  .draft-tracker::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 30%, transparent 30%, transparent 100%);
  }
  .draft-tracker.expanded { padding: 14px 24px 22px; }
  .dt-header {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    cursor: pointer; user-select: none;
    padding: 4px 0;
    transition: opacity .15s;
  }
  .dt-header:hover { opacity: 0.85; }
  .draft-tracker.expanded .dt-header { margin-bottom: 14px; }
  .dt-live {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent-ink);
    font-weight: 700;
    letter-spacing: .14em;
    background: var(--accent);
    padding: 4px 10px;
    border-radius: 2px;
    animation: dt-pulse 2s infinite;
  }
  @keyframes dt-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .dt-title {
    font-family: 'Archivo', sans-serif;
    font-size: 20px; font-weight: 800;
    letter-spacing: -0.015em;
    color: #fff;
  }
  .dt-count { font-size: 10px; color: rgba(255,255,255,0.55); font-family: 'JetBrains Mono', monospace; letter-spacing: .06em; text-transform: uppercase; }
  .dt-latest {
    font-size: 12px; color: rgba(255,255,255,0.78);
    font-family: 'Inter', sans-serif; font-weight: 500;
    padding-left: 16px; margin-left: 4px;
    border-left: 1px solid rgba(255,255,255,0.15);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 120px;
  }
  .dt-latest-num { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-weight: 700; margin-right: 6px; }
  .dt-toggle {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Archivo', sans-serif;
    font-size: 10px; font-weight: 700;
    color: rgba(255,255,255,0.75);
    letter-spacing: .1em; text-transform: uppercase;
    padding: 5px 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 2px;
    transition: all .12s;
  }
  .dt-header:hover .dt-toggle { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  .dt-chevron { display: inline-block; transition: transform .2s; font-size: 9px; }
  .draft-tracker.expanded .dt-chevron { transform: rotate(180deg); }
  .draft-tracker.collapsed .dt-list { display: none; }
  .draft-tracker.expanded .dt-latest { display: none; }
  .dt-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
  .dt-pick {
    display: flex; gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 2px;
    padding: 12px 14px;
    transition: all .15s;
  }
  .dt-pick:hover { border-color: var(--accent); background: rgba(202,255,63,0.06); }
  .dt-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700;
    color: var(--accent);
    min-width: 46px;
    line-height: 1;
  }
  .dt-num-round { display: block; font-size: 9px; color: rgba(255,255,255,0.4); font-weight: 500; letter-spacing: .06em; margin-top: 4px; }
  .dt-body { flex: 1; min-width: 0; }
  .dt-player { font-weight: 700; color: #fff; font-size: 14px; line-height: 1.35; font-family: 'Archivo', sans-serif; letter-spacing: -0.005em; }
  .dt-pos {
    display: inline-block; font-size: 9px; font-weight: 700;
    color: rgba(255,255,255,0.75); font-family: 'JetBrains Mono', monospace;
    margin-left: 6px; background: rgba(255,255,255,0.1);
    padding: 2px 6px; border-radius: 2px;
    letter-spacing: .06em;
  }
  .dt-team { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 4px; font-weight: 500; }
  .dt-school { color: rgba(255,255,255,0.45); }
  .dt-note { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 6px; line-height: 1.5; }

  /* ─── Main-feed Scores (wider layout) ─── */
  .main-section-header { font-size: 11px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 16px; }
  .main-score-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .main-score-tab { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--rule); cursor: pointer; background: var(--surface); color: var(--ink-2); font-family: 'Inter', sans-serif; transition: all .15s; }
  .main-score-tab:hover { border-color: var(--ink-3); }
  .main-score-tab.active { background: var(--ink-deep); color: #fff; border-color: var(--ink); }
  .main-scores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .main-score-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 6px; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
  .main-score-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--ink-2); }
  .main-score-row.winner { font-weight: 600; color: var(--ink); }
  .main-score-team { flex: 1; }
  .main-score-num { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; min-width: 36px; text-align: right; }
  .main-score-footer { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); padding-top: 6px; border-top: 1px solid var(--rule); }
  .main-score-footer.live { color: var(--red); font-weight: 600; }

  /* ─── Main-feed Predictions (wider layout) ─── */
  .main-prediction-list { display: flex; flex-direction: column; gap: 18px; }
  .main-prediction-item { padding: 14px 0; border-bottom: 1px solid var(--rule); }
  .main-prediction-item:last-child { border-bottom: none; }
  .main-prediction-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 8px; }
  .main-prediction-statement { flex: 1; font-family: 'Archivo', sans-serif; font-size: 19px; font-weight: 800; line-height: 1.3; letter-spacing: -0.015em; color: var(--ink); }
  .main-prediction-pct { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--ink); white-space: nowrap; }
  .main-prediction-bar-track { height: 6px; background: var(--rule); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .main-prediction-bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .main-prediction-rationale { font-size: 13px; color: var(--ink-2); line-height: 1.6; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div>
      <div class="logo">Sports<em>Biz</em><span style="color:#fff">Now!</span></div>
      <div class="logo-sub">Sports Industry Intelligence</div>
    </div>
    <div class="header-dateline" id="hd-dateline"></div>
  </div>
  <nav class="nav-bar">
    <button class="nav-pill active" data-cat="all"      onclick="filterCat(this,'all')">All Stories</button>
    <button class="nav-pill" data-cat="media"     onclick="filterCat(this,'media')">Media &amp; Broadcast</button>
    <button class="nav-pill" data-cat="contracts" onclick="filterCat(this,'contracts')">Contracts</button>
    <button class="nav-pill" data-cat="leagues"   onclick="filterCat(this,'leagues')">Leagues</button>
    <button class="nav-pill" data-cat="revenue"   onclick="filterCat(this,'revenue')">Revenue &amp; Sponsorship</button>
    <button class="nav-pill" data-cat="labor"     onclick="filterCat(this,'labor')">Labor &amp; Cap</button>
    <button class="nav-pill" data-cat="analytics" onclick="filterCat(this,'analytics')">Sports Analytics<span class="nav-chev">▾</span></button>
  </nav>
  <nav class="subnav-bar" id="subnav-bar">
    <span class="subnav-prefix">↳</span>
    <button class="subnav-pill active" data-sub="picks"       onclick="filterSub(this,'picks')">Value Picks</button>
    <button class="subnav-pill"        data-sub="highlights"  onclick="filterSub(this,'highlights')">Highlights</button>
    <button class="subnav-pill"        data-sub="scores"      onclick="filterSub(this,'scores')">Scores</button>
    <button class="subnav-pill"        data-sub="predictions" onclick="filterSub(this,'predictions')">Predictions</button>
  </nav>
</header>

<div class="ticker-wrap"><div class="ticker-inner" id="ticker-inner">Loading sports business wire...</div></div>

<div class="toolbar">
  <span class="updated-label" id="updated-label">Loading...</span>
  <button class="refresh-btn" id="refresh-btn" onclick="loadStories()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Refresh
  </button>
</div>

<section id="draft-tracker" class="draft-tracker" style="display:none;"></section>

<div class="page">
  <div class="main-feed" id="main-feed">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-title">Loading latest sports business news...</div>
    </div>
  </div>
  <div class="sidebar">
    <div class="widget-box">
      <div class="widget-header">
        <span class="widget-title">Today's Poll</span>
      </div>
      <div class="widget-body" id="widget-body"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-heading">Quick Hits</div>
      <div id="sidebar-quick"></div>
    </div>
    <div class="sidebar-section" id="sidebar-move-section" style="display:none">
      <div class="sidebar-heading">On the Move</div>
      <div id="sidebar-move"></div>
    </div>
    <div class="sidebar-promo">SportsBizNow! Intelligence<br>Powered by RSS &amp; Claude AI</div>
  </div>
</div>

<script>
  var allData   = null;
  var activeCat = 'all';
  var activeSub = 'picks'; // sub-tab inside Sports Analytics: 'picks' | 'highlights'
  var activeWidget = 'poll';
  var POLL = { question: '', options: [] };
  var PICKS = [];
  var PREDICTIONS = [];
  var HIGHLIGHTS = [];

  // ESPN scoreboard endpoints for the Scores widget
  var ESPN_LEAGUES = [
    // US major leagues
    { id: 'nba', label: 'NBA', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard' },
    { id: 'nfl', label: 'NFL', url: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard'   },
    { id: 'mlb', label: 'MLB', url: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard'   },
    { id: 'nhl', label: 'NHL', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard'     },
    // Soccer — Europe + MLS
    { id: 'epl',        label: 'EPL',         url: 'https://site.api.espn.com/apis/site/v2/sports/soccer/eng.1/scoreboard'            },
    { id: 'laliga',     label: 'La Liga',     url: 'https://site.api.espn.com/apis/site/v2/sports/soccer/esp.1/scoreboard'            },
    { id: 'bundesliga', label: 'Bundesliga',  url: 'https://site.api.espn.com/apis/site/v2/sports/soccer/ger.1/scoreboard'            },
    { id: 'seriea',     label: 'Serie A',     url: 'https://site.api.espn.com/apis/site/v2/sports/soccer/ita.1/scoreboard'            },
    { id: 'ligue1',     label: 'Ligue 1',     url: 'https://site.api.espn.com/apis/site/v2/sports/soccer/fra.1/scoreboard'            },
    { id: 'ucl',        label: 'UCL',         url: 'https://site.api.espn.com/apis/site/v2/sports/soccer/uefa.champions/scoreboard'   },
    { id: 'mls',        label: 'MLS',         url: 'https://site.api.espn.com/apis/site/v2/sports/soccer/usa.1/scoreboard'            }
  ];
  var activeLeague = 'nba';
  var scoresCache = {};

  var TAG = {
    media:     { label:'Media & Broadcast',    cls:'tag-media'     },
    contracts: { label:'Contracts',             cls:'tag-contracts' },
    leagues:   { label:'Leagues',               cls:'tag-leagues'   },
    revenue:   { label:'Revenue & Sponsorship', cls:'tag-revenue'   },
    labor:     { label:'Labor / Cap',           cls:'tag-labor'     },
    default:   { label:'Business',              cls:'tag-default'   }
  };

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function openArticle(idx) {
    var data = allData;
    if (!data || !data.clusters) return;
    var cl = data.clusters[idx];
    if (!cl) return;
    var tag = TAG[cl.category] || TAG.default;
    showArticleModal(tag, cl.leadHeadline, cl.leadSource, cl.article || cl.summary || '');
  }

  function openSidebarByIndex(idx) {
    var item = sidebarStore[idx];
    if (!item) return;
    openSidebarArticle(item.headline, item.source, item.article || item.headline);
  }

  function openSidebarArticle(headline, source, article) {
    showArticleModal(TAG.default, headline, source, article || headline);
  }

  function showArticleModal(tag, headline, source, articleText) {
    document.getElementById('modal-tag').className = 'article-modal-tag ' + (tag ? tag.cls : 'tag-default');
    document.getElementById('modal-tag').textContent = tag ? tag.label : 'Sports Business';
    document.getElementById('modal-headline').textContent = headline || '';
    document.getElementById('modal-meta').textContent = source || '';
    var body = document.getElementById('modal-body');
    var paras = String(articleText).split('\n').filter(function(p){return p.trim();});
    body.innerHTML = paras.map(function(p){return '<p>'+esc(p)+'</p>';}).join('');
    document.getElementById('article-modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeArticle(e) {
    if (e.target === document.getElementById('article-modal')) closeArticleBtn();
  }

  function closeArticleBtn() {
    document.getElementById('article-modal').style.display = 'none';
    document.body.style.overflow = '';
  }

  // Sidebar widget is now poll-only (Scores and Predictions moved to main feed under Sports Analytics)
  function renderWidget() {
    var body = document.getElementById('widget-body');
    if (!body) return;
    body.innerHTML = buildPoll();
  }

  function buildPoll() {
    if (!POLL || !POLL.question) return '<div style="padding:16px;color:var(--ink-3);font-size:13px;">Poll loading...</div>';
    var voted = localStorage.getItem('sb_poll_v1');
    if (voted) {
      var votes = JSON.parse(localStorage.getItem('sb_poll_votes') || '{}');
      var total = Object.values(votes).reduce(function(a,b){return a+b;},0) || 1;
      return '<div class="poll-question">'+esc(POLL.question)+'</div>' +
        POLL.options.map(function(opt,i) {
          var pct = Math.round(((votes[i]||0)/total)*100);
          var winner = pct === Math.max.apply(null,Object.values(votes).map(function(v){return Math.round((v/total)*100);}));
          return '<div class="poll-result">'+
            '<div class="poll-result-label"><span>'+esc(opt)+'</span><span class="poll-result-pct">'+pct+'%</span></div>'+
            '<div class="poll-bar-track"><div class="poll-bar-fill'+(winner?' winner':'')+'" style="width:'+pct+'%"></div></div>'+
          '</div>';
        }).join('') +
        '<div style="font-size:10px;color:var(--ink-3);margin-top:8px;">'+total+' vote'+(total===1?'':'s')+'</div>';
