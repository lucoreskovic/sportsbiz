<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SportsBizNow! — Sports Industry News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a7a45; --green-light: #e8f4ed;
    --amber: #a05a00; --amber-light: #fef3e2;
    --blue: #2545a8;  --blue-light: #e8eeff;
    --purple: #8b1a6b; --purple-light: #f9e8f4;
    --red: #a82525;   --red-light: #ffecec;
    --ink: #1a1a18; --ink-2: #4a4a46; --ink-3: #888880;
    --rule: #e0dfd8; --bg: #faf9f6; --surface: #ffffff;
  }
  body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.5; }
  .site-header { background: var(--ink); color: #fff; padding: 0 24px; }
  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 12px; border-bottom: 1px solid rgba(255,255,255,0.12); }
  .logo { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 900; letter-spacing: -1.5px; line-height: 1; color: #fff; }
  .logo em { color: #4ade80; font-style: normal; }
  .logo-sub { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-top: 3px; }
  .header-dateline { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.45); text-align: right; letter-spacing: .04em; }
  .nav-bar { display: flex; align-items: center; gap: 2px; padding: 8px 0; overflow-x: auto; scrollbar-width: none; }
  .nav-bar::-webkit-scrollbar { display: none; }
  .nav-pill { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 4px 11px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.18); cursor: pointer; background: transparent; color: rgba(255,255,255,0.55); white-space: nowrap; transition: all .15s; font-family: 'IBM Plex Sans', sans-serif; }
  .nav-pill:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-pill.active { background: #4ade80; color: var(--ink); border-color: #4ade80; }
  .nav-chev { display: inline-block; font-size: 8px; margin-left: 4px; opacity: .7; transition: transform .15s; }
  .nav-pill.active .nav-chev { transform: rotate(180deg); opacity: 1; }
  .subnav-bar { display: none; align-items: center; gap: 6px; padding: 8px 0 10px; border-top: 1px solid rgba(255,255,255,0.08); }
  .subnav-bar.open { display: flex; }
  .subnav-prefix { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.3); margin-right: 4px; letter-spacing: 0; }
  .subnav-pill { font-size: 10px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; padding: 3px 11px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; background: transparent; color: rgba(255,255,255,0.65); white-space: nowrap; font-family: 'IBM Plex Sans', sans-serif; transition: all .15s; }
  .subnav-pill:hover { border-color: rgba(255,255,255,0.45); color: #fff; }
  .subnav-pill.active { background: rgba(74,222,128,0.18); color: #4ade80; border-color: #4ade80; }
  .ticker-wrap { background: var(--green); overflow: hidden; white-space: nowrap; padding: 5px 0; }
  .ticker-inner { display: inline-block; animation: ticker 120s linear infinite; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #fff; letter-spacing: .04em; }
  @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
  .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; border-bottom: 1px solid var(--rule); background: var(--surface); }
  .updated-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink-3); letter-spacing: .03em; }
  .refresh-btn { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 5px 13px; border-radius: 4px; border: 1px solid var(--rule); cursor: pointer; background: var(--surface); color: var(--ink-2); font-family: 'IBM Plex Sans', sans-serif; transition: all .15s; }
  .refresh-btn:hover { background: var(--bg); border-color: var(--ink-3); }
  .refresh-btn:disabled { opacity: .5; cursor: not-allowed; }
  .refresh-btn.spinning svg { animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .page { max-width: 1100px; margin: 0 auto; padding: 20px 24px 40px; display: grid; grid-template-columns: 1fr 260px; gap: 28px; align-items: start; }
  @media (max-width: 760px) { .page { grid-template-columns: 1fr; } }
  .loading-state { text-align: center; padding: 60px 0; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--rule); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 14px; }
  .loading-title { font-size: 13px; font-weight: 600; color: var(--ink-2); }
  .loading-step  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-3); margin-top: 5px; }
  .error-box { background: #fff8f8; border: 1px solid #ffd4d4; border-radius: 8px; padding: 24px; }
  .error-box h3 { font-size: 14px; color: var(--red); margin-bottom: 6px; }
  .error-box p  { font-size: 12px; color: var(--ink-2); line-height: 1.6; }
  .try-again-btn { margin-top: 14px; display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--rule); cursor: pointer; background: var(--surface); color: var(--ink-2); font-family: 'IBM Plex Sans', sans-serif; }
  .main-feed { display: flex; flex-direction: column; }
  .cluster { padding: 18px 0; border-bottom: 1px solid var(--rule); }
  .cluster:first-child { padding-top: 4px; }
  .cat-tag { display: inline-block; font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; margin-bottom: 7px; }
  .tag-media     { background: var(--green-light);  color: var(--green);  }
  .tag-contracts { background: var(--amber-light);  color: var(--amber);  }
  .tag-leagues   { background: var(--blue-light);   color: var(--blue);   }
  .tag-revenue   { background: var(--purple-light); color: var(--purple); }
  .tag-labor     { background: var(--red-light);    color: var(--red);    }
  .tag-default   { background: #f0efeb; color: var(--ink-3); }
  .lead-headline { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; line-height: 1.28; color: var(--ink); transition: color .12s; text-decoration: none; display: block; }
  .lead-headline:hover { color: var(--green); }
  .lead-source  { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 5px; letter-spacing: .02em; }
  .lead-summary { font-size: 13px; color: var(--ink-2); margin-top: 7px; line-height: 1.6; max-width: 95%; }
  /* ARTICLE MODAL */
  .article-modal-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto; }
  .article-modal { background:var(--surface);max-width:680px;width:100%;border-radius:4px;padding:32px;position:relative;margin:auto; }
  .article-modal-close { position:absolute;top:14px;right:16px;font-size:20px;cursor:pointer;color:var(--ink-3);background:none;border:none;line-height:1; }
  .article-modal-close:hover { color:var(--ink); }
  .article-modal-tag { display:inline-block;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-bottom:10px; }
  .article-modal-headline { font-family:'Playfair Display',serif;font-size:24px;font-weight:700;line-height:1.3;color:var(--ink);margin-bottom:8px; }
  .article-modal-meta { font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-3);margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--rule); }
  .article-modal-body { font-size:15px;color:var(--ink-2);line-height:1.75; }
  .article-modal-body p { margin-bottom:14px; }

  .posts-label { font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); margin-top: 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .posts-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .posts-list { display: flex; flex-direction: column; gap: 4px; }
  .post-card { background: var(--bg); border: 1px solid var(--rule); border-radius: 6px; padding: 6px 9px; text-decoration: none; display: block; transition: border-color .12s; }
  .post-card:hover { border-color: var(--ink-3); }
  .post-header { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
  .post-avatar { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 600; flex-shrink: 0; color: #fff; }
  .avatar-x { background: #000; }
  .avatar-bluesky { background: #0085ff; }
  .post-meta { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 5px; }
  .post-name { font-size: 11px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .post-handle { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--ink-3); white-space: nowrap; }
  .post-platform { flex-shrink: 0; width: 11px; height: 11px; }
  .post-body { font-size: 11px; color: var(--ink-2); line-height: 1.5; }
  .post-time { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--ink-3); margin-top: 3px; }
  .sidebar { display: flex; flex-direction: column; }
  .sidebar-section { margin-bottom: 22px; }
  .sidebar-heading { font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-3); border-bottom: 1px solid var(--rule); padding-bottom: 6px; margin-bottom: 10px; }
  .sidebar-item { display: flex; gap: 9px; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid var(--rule); text-decoration: none; transition: opacity .12s; }
  .sidebar-item:last-child { border-bottom: none; }
  .sidebar-item:hover { opacity: .75; }
  .sb-dot  { flex-shrink: 0; width: 5px; height: 5px; border-radius: 50%; background: var(--green); margin-top: 5px; }
  .sb-text { font-size: 12px; color: var(--ink-2); line-height: 1.45; }
  .sb-src  { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 2px; }
  .sidebar-promo { border: 1px dashed var(--rule); border-radius: 6px; padding: 16px; text-align: center; color: var(--ink-3); font-size: 11px; font-family: 'IBM Plex Mono', monospace; letter-spacing: .04em; }
  .widget-box { background: var(--surface); border: 2px solid var(--ink); margin-bottom: 28px; }
  .widget-header { padding: 10px 14px 8px; border-bottom: 1px solid var(--rule); }
  .widget-title { font-size: 16px; font-weight: 700; color: var(--ink-2); font-family: 'IBM Plex Sans', sans-serif; display: block; margin-bottom: 6px; }
  .widget-switcher { display: flex; gap: 3px; }
  .widget-type-btn { font-size: 9px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--rule); cursor: pointer; background: transparent; color: var(--ink-3); font-family: 'IBM Plex Sans', sans-serif; transition: all .12s; white-space: nowrap; }
  .widget-type-btn:hover  { background: var(--rule); color: var(--ink-2); }
  .widget-type-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .widget-body { padding: 14px; }
  .poll-question { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.4; margin-bottom: 12px; }
  .poll-option { margin-bottom: 7px; }
  .poll-option-btn { width: 100%; text-align: left; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--rule); background: var(--bg); cursor: pointer; font-size: 12px; color: var(--ink-2); font-family: 'IBM Plex Sans', sans-serif; transition: all .12s; }
  .poll-option-btn:hover  { border-color: var(--green); color: var(--green); background: var(--green-light); }
  .poll-result { margin-bottom: 8px; }
  .poll-result-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-2); margin-bottom: 3px; }
  .poll-result-pct { font-weight: 600; color: var(--ink); }
  .poll-bar-track { height: 5px; background: var(--rule); border-radius: 3px; overflow: hidden; }
  .poll-bar-fill  { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s ease; }
  .poll-bar-fill.winner { background: var(--ink); }
  .poll-meta  { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 10px; }
  .poll-reset { font-size: 10px; color: var(--ink-3); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: 'IBM Plex Sans', sans-serif; margin-left: 8px; }
  .score-league { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--ink-3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
  .score-game { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--rule); }
  .score-game:last-child { border-bottom: none; }
  .score-teams { flex: 1; }
  .score-team { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--ink-2); line-height: 1.7; }
  .score-team.winner { font-weight: 600; color: var(--ink); }
  .score-num { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; min-width: 28px; text-align: right; }
  .score-status { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--ink-3); text-align: center; padding: 0 8px; white-space: nowrap; }
  .score-status.live { color: var(--red); font-weight: 600; }
  .score-tabs { display: flex; gap: 3px; margin-bottom: 10px; }
  .score-tab { font-size: 9px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--rule); cursor: pointer; background: transparent; color: var(--ink-3); font-family: 'IBM Plex Sans', sans-serif; transition: all .12s; }
  .score-tab:hover { background: var(--rule); }
  .score-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .score-loading { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-3); padding: 12px 0; text-align: center; }
  .widget-blank { text-align: center; padding: 20px 0; }
  .picks-disclaimer { font-size: 9px; color: var(--ink-3); margin-top: 10px; font-family: IBM Plex Mono, monospace; }
  .widget-blank-text { font-size: 12px; color: var(--ink-3); line-height: 1.6; }

  /* ─── Main-feed Scores (wider layout) ─── */
  .main-section-header { font-size: 11px; color: var(--ink-3); font-family: 'IBM Plex Mono', monospace; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 16px; }
  .main-score-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .main-score-tab { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--rule); cursor: pointer; background: var(--surface); color: var(--ink-2); font-family: 'IBM Plex Sans', sans-serif; transition: all .15s; }
  .main-score-tab:hover { border-color: var(--ink-3); }
  .main-score-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .main-scores-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .main-score-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 6px; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; }
  .main-score-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--ink-2); }
  .main-score-row.winner { font-weight: 600; color: var(--ink); }
  .main-score-team { flex: 1; }
  .main-score-num { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; min-width: 36px; text-align: right; }
  .main-score-footer { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--ink-3); padding-top: 6px; border-top: 1px solid var(--rule); }
  .main-score-footer.live { color: var(--red); font-weight: 600; }

  /* ─── Main-feed Predictions (wider layout) ─── */
  .main-prediction-list { display: flex; flex-direction: column; gap: 18px; }
  .main-prediction-item { padding: 14px 0; border-bottom: 1px solid var(--rule); }
  .main-prediction-item:last-child { border-bottom: none; }
  .main-prediction-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 8px; }
  .main-prediction-statement { flex: 1; font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1.35; color: var(--ink); }
  .main-prediction-pct { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 700; color: var(--ink); white-space: nowrap; }
  .main-prediction-bar-track { height: 6px; background: var(--rule); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .main-prediction-bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }
  .main-prediction-rationale { font-size: 13px; color: var(--ink-2); line-height: 1.6; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div>
      <div class="logo">Sports<em>Biz</em><span style="color:#fff">Now!</span></div>
      <div class="logo-sub">Sports Industry Intelligence</div>
    </div>
    <div class="header-dateline" id="hd-dateline"></div>
  </div>
  <nav class="nav-bar">
    <button class="nav-pill active" data-cat="all"      onclick="filterCat(this,'all')">All Stories</button>
    <button class="nav-pill" data-cat="media"     onclick="filterCat(this,'media')">Media &amp; Broadcast</button>
    <button class="nav-pill" data-cat="contracts" onclick="filterCat(this,'contracts')">Contracts</button>
    <button class="nav-pill" data-cat="leagues"   onclick="filterCat(this,'leagues')">Leagues</button>
    <button class="nav-pill" data-cat="revenue"   onclick="filterCat(this,'revenue')">Revenue &amp; Sponsorship</button>
    <button class="nav-pill" data-cat="labor"     onclick="filterCat(this,'labor')">Labor &amp; Cap</button>
    <button class="nav-pill" data-cat="analytics" onclick="filterCat(this,'analytics')">Sports Analytics<span class="nav-chev">▾</span></button>
  </nav>
  <nav class="subnav-bar" id="subnav-bar">
    <span class="subnav-prefix">↳</span>
    <button class="subnav-pill active" data-sub="picks"       onclick="filterSub(this,'picks')">Value Picks</button>
    <button class="subnav-pill"        data-sub="highlights"  onclick="filterSub(this,'highlights')">Highlights</button>
    <button class="subnav-pill"        data-sub="scores"      onclick="filterSub(this,'scores')">Scores</button>
    <button class="subnav-pill"        data-sub="predictions" onclick="filterSub(this,'predictions')">Predictions</button>
  </nav>
</header>

<div class="ticker-wrap"><div class="ticker-inner" id="ticker-inner">Loading sports business wire...</div></div>

<div class="toolbar">
  <span class="updated-label" id="updated-label">Loading...</span>
  <button class="refresh-btn" id="refresh-btn" onclick="loadStories()">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Refresh
  </button>
</div>

<div class="page">
  <div class="main-feed" id="main-feed">
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-title">Loading latest sports business news...</div>
    </div>
  </div>
  <div class="sidebar">
    <div class="widget-box">
      <div class="widget-header">
        <span class="widget-title">Today's Poll</span>
      </div>
      <div class="widget-body" id="widget-body"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-heading">Quick Hits</div>
      <div id="sidebar-quick"></div>
    </div>
    <div class="sidebar-section" id="sidebar-move-section" style="display:none">
      <div class="sidebar-heading">On the Move</div>
      <div id="sidebar-move"></div>
    </div>
    <div class="sidebar-promo">SportsBizNow! Intelligence<br>Powered by RSS &amp; Claude AI</div>
  </div>
</div>

<script>
  var allData   = null;
  var activeCat = 'all';
  var activeSub = 'picks'; // sub-tab inside Sports Analytics: 'picks' | 'highlights'
  var activeWidget = 'poll';
  var POLL = { question: '', options: [] };
  var PICKS = [];
  var PREDICTIONS = [];
  var HIGHLIGHTS = [];

  // ESPN scoreboard endpoints for the Scores widget
  var ESPN_LEAGUES = [
    { id: 'nba', label: 'NBA', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard' },
    { id: 'mlb', label: 'MLB', url: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard'   },
    { id: 'nhl', label: 'NHL', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard'     },
    { id: 'nfl', label: 'NFL', url: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard'   }
  ];
  var activeLeague = 'nba';
  var scoresCache = {};

  var TAG = {
    media:     { label:'Media & Broadcast',    cls:'tag-media'     },
    contracts: { label:'Contracts',             cls:'tag-contracts' },

  function buildPoll() {
    if (!POLL || !POLL.question) return '<div style="padding:16px;color:var(--ink-3);font-size:13px;">Poll loading...</div>';
    var voted = localStorage.getItem('sb_poll_v1');
    if (voted) {
      var votes = JSON.parse(localStorage.getItem('sb_poll_votes') || '{}');
      var total = Object.values(votes).reduce(function(a,b){return a+b;},0) || 1;
      return '<div class="poll-question">'+esc(POLL.question)+'</div>' +
        POLL.options.map(function(opt,i) {
          var pct = Math.round(((votes[i]||0)/total)*100);
          var winner = pct === Math.max.apply(null,Object.values(votes).map(function(v){return Math.round((v/total)*100);}));
          return '<div class="poll-result">'+
            '<div class="poll-result-label"><span>'+esc(opt)+'</span><span class="poll-result-pct">'+pct+'%</span></div>'+
            '<div class="poll-bar-track"><div class="poll-bar-fill'+(winner?' winner':'')+'" style="width:'+pct+'%"></div></div>'+
          '</div>';
        }).join('') +
        '<div style="font-size:10px;color:var(--ink-3);margin-top:8px;">'+total+' vote'+(total===1?'':'s')+'</div>';
    }
    return '<div class="poll-question">'+esc(POLL.question)+'</div>' +
      POLL.options.map(function(opt,i) {
        return '<button class="poll-option" onclick="votePoll('+i+')">'+esc(opt)+'</button>';
      }).join('');
  }

  function votePoll(idx) {
    var votes = JSON.parse(localStorage.getItem('sb_poll_votes') || '{}');
    votes[idx] = (votes[idx]||0)+1;
    localStorage.setItem('sb_poll_votes', JSON.stringify(votes));

    renderWidget();

    var title = document.getElementById('hl-title');
    if (title) title.textContent = v.title;

    vids.forEach(function(vid, i) {
      var dot = document.getElementById('dot' + i);
      if (!dot) return;
      var col = colors[vid.league] || '#333';
      dot.style.background = i === idx ? col : 'var(--rule)';

    });

    var ms = document.getElementById('sidebar-move-section');
    if (sidebar.length > 5) {
      document.getElementById('sidebar-move').innerHTML = sidebar.slice(5,10).map(function(it,i){return item(it,i+5);}).join('');
      ms.style.display = '';
    } else { ms.style.display = 'none'; }
  }

  function renderTicker(data) {
    var ticker = document.getElementById('ticker-inner');
    if (!ticker || !data || !data.clusters) return;
    var items = (data.clusters||[]).map(function(cl) { return cl.leadHeadline; });
    if (data.sidebar) items = items.concat((data.sidebar||[]).map(function(s){return s.headline;}));
    ticker.innerHTML = items.filter(Boolean).map(function(h) {
      return '<span class="ticker-item">' + esc(h) + '</span>';
    }).join(' <span class="ticker-sep">·</span> ');
  }

  async function loadStories() {
    var btn = document.getElementById('refresh-btn');
    if (btn) { btn.disabled = true; btn.classList.add('spinning'); }
    try {
      var res = await fetch('stories.json?nc=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      if (!data || !data.clusters || data.clusters.length === 0) throw new Error('empty');
      allData = data;
      if (data.poll && data.poll.question) {
        var prevQ = localStorage.getItem('sb_poll_question');
        if (prevQ !== data.poll.question) { localStorage.removeItem('sb_poll_v1'); localStorage.setItem('sb_poll_question', data.poll.question); }
        POLL = data.poll;
      }
      if (Array.isArray(data.picks) && data.picks.length) PICKS = data.picks;
      if (Array.isArray(data.predictions) && data.predictions.length) PREDICTIONS = data.predictions;
      if (Array.isArray(data.highlights) && data.highlights.length) HIGHLIGHTS = data.highlights;
      if (activeCat === 'analytics') renderActiveSub();
      else renderFeed(allData);
      renderSidebar(allData);
      renderWidget();
      var t = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
      document.getElementById('updated-label').textContent = 'Feed updated ' + t + ' · auto-refreshes every 2h';
      if (typeof renderTicker === 'function') renderTicker(allData);
    } catch(err) {
      console.warn('loadStories error:', err.message);
      if (allData) {
        if (activeCat === 'analytics') renderActiveSub();
        else renderFeed(allData);
      } else {
        document.getElementById('main-feed').innerHTML = '<div class="loading-state"><div class="loading-title">Loading stories...</div><div class="loading-sub">If this persists, go to GitHub Actions and run the Refresh Stories workflow.</div></div>';
      }
    } finally {
      var btn2 = document.getElementById('refresh-btn');
      if (btn2) { btn2.disabled = false; btn2.classList.remove('spinning'); }
    }
  }
  async function fetchScores(leagueId) {
    activeLeague = leagueId;
    // Update tab active state for main-feed tabs
    document.querySelectorAll('.main-score-tab').forEach(function(t){
      var lg = ESPN_LEAGUES.find(function(l){return l.id===leagueId;});
      t.classList.toggle('active', lg && t.textContent === lg.label);
    });
    var el = document.getElementById('scores-games');
    if (!el) return;

    // Serve from short-lived cache (5 min)
    var cached = scoresCache[leagueId];
    if (cached && Date.now() - cached.ts < 300000) { el.innerHTML = cached.html; return; }

    el.innerHTML = '<div class="score-loading">Loading scores...</div>';
    try {
      var league = ESPN_LEAGUES.find(function(l){return l.id===leagueId;});
      var res  = await fetch(league.url);
      var data = await res.json();
      var events = data.events || [];
      if (events.length === 0) { el.innerHTML = '<div class="score-loading">No games today.</div>'; return; }

      var html = events.slice(0, 12).map(function(ev) {
        var comp   = ev.competitions[0];
        var teams  = comp.competitors;
        var home   = teams.find(function(t){return t.homeAway==='home';}) || teams[0];
        var away   = teams.find(function(t){return t.homeAway==='away';}) || teams[1];
        var status = ev.status;
        var stateType = status.type.name; // STATUS_FINAL, STATUS_IN_PROGRESS, STATUS_SCHEDULED
        var statusTxt, isLive = false;
        if (stateType === 'STATUS_FINAL') {
          statusTxt = status.type.shortDetail || 'Final';
        } else if (stateType === 'STATUS_IN_PROGRESS') {
          statusTxt = status.displayClock ? (status.period ? 'Q'+status.period+' ' : '') + status.displayClock : 'Live';
          isLive = true;
        } else {
          var d = new Date(ev.date);
          statusTxt = d.toLocaleDateString('en-US',{weekday:'short'}) + ' ' +
                      d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        }
        var hScore = parseInt(home.score) || 0;
        var aScore = parseInt(away.score) || 0;
        var hWin = stateType==='STATUS_FINAL' && hScore > aScore;
        var aWin = stateType==='STATUS_FINAL' && aScore > hScore;
        var hName = home.team.shortDisplayName || home.team.abbreviation || '';
        var aName = away.team.shortDisplayName || away.team.abbreviation || '';
        var hDisp = stateType==='STATUS_SCHEDULED' ? '' : hScore;
        var aDisp = stateType==='STATUS_SCHEDULED' ? '' : aScore;
        return '<div class="main-score-card">'+
          '<div class="main-score-row '+(aWin?'winner':'')+'"><span class="main-score-team">'+esc(aName)+'</span><span class="main-score-num">'+aDisp+'</span></div>'+
          '<div class="main-score-row '+(hWin?'winner':'')+'"><span class="main-score-team">'+esc(hName)+'</span><span class="main-score-num">'+hDisp+'</span></div>'+
          '<div class="main-score-footer'+(isLive?' live':'')+'">'+esc(statusTxt)+'</div>'+
        '</div>';
      }).join('');

      scoresCache[leagueId] = { html: html, ts: Date.now() };
      el.innerHTML = html;
    } catch(err) {
      el.innerHTML = '<div class="score-loading">Could not load scores.</div>';
    }
  }


  setDateline();
  setInterval(setDateline, 60000);
  renderWidget();
  renderPicksFeed();
  loadStories();
</script>
