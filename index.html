  // Browser-side fallback picks. Fetched dynamically from today's real ESPN
  // scoreboard — NOT hardcoded, so they're never stale. Each pick is a plain
  // "favorite to cover" or "moneyline home favorite" template, generated from
  // today's actual schedule. This guarantees something visible even if the
  // backend cron hasn't populated stories.json yet.
  //
  // Quality caveat: these template picks aren't research-backed. They're
  // sensible defaults based on home-field advantage, records, and matchup
  // generics. When the backend cron produces real research-backed picks,
  // those override these entirely.
  var FALLBACK_PICKS = [];
  var _fallbackFetched = false;

  async function ensureFallbackPicks() {
    if (_fallbackFetched) return;
    _fallbackFetched = true;

    // One ESPN endpoint per sport we cover. Takes ~1-2s total for all.
    var endpoints = [
      { sport: 'basketball', league: 'NBA',   url: ESPN_LEAGUES.find(function(l){return l.id==='nba';}).url        },
      { sport: 'football',   league: 'NFL',   url: ESPN_LEAGUES.find(function(l){return l.id==='nfl';}).url        },
      { sport: 'baseball',   league: 'MLB',   url: ESPN_LEAGUES.find(function(l){return l.id==='mlb';}).url        },
      { sport: 'hockey',     league: 'NHL',   url: ESPN_LEAGUES.find(function(l){return l.id==='nhl';}).url        },
      { sport: 'soccer',     league: 'EPL',   url: ESPN_LEAGUES.find(function(l){return l.id==='epl';}).url        },
      { sport: 'soccer',     league: 'UCL',   url: ESPN_LEAGUES.find(function(l){return l.id==='ucl';}).url        },
      { sport: 'soccer',     league: 'La Liga', url: ESPN_LEAGUES.find(function(l){return l.id==='laliga';}).url   },
      { sport: 'soccer',     league: 'MLS',   url: ESPN_LEAGUES.find(function(l){return l.id==='mls';}).url        },
    ];

    var results = await Promise.all(endpoints.map(function(ep) {
      return fetch(ep.url, { signal: AbortSignal.timeout(5000) })
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(data) { return { ep: ep, data: data }; })
        .catch(function() { return { ep: ep, data: null }; });
    }));

    var now = new Date();
    var nowTs = now.getTime();
    var horizonTs = nowTs + 36 * 60 * 60 * 1000; // next 36h

    var picksBySport = { basketball: [], football: [], baseball: [], hockey: [], soccer: [] };

    results.forEach(function(r) {
      if (!r.data || !r.data.events) return;
      r.data.events.forEach(function(ev) {
        var gameTs = new Date(ev.date).getTime();
        // Skip games already started or too far out
        if (gameTs < nowTs - 60 * 60 * 1000 || gameTs > horizonTs) return;
        // Skip finished games
        var stateType = ev.status && ev.status.type && ev.status.type.name;
        if (stateType === 'STATUS_FINAL' || stateType === 'STATUS_FULL_TIME') return;
        // Skip live games (no value betting a game in progress)
        if (stateType === 'STATUS_IN_PROGRESS') return;

        var comp = ev.competitions && ev.competitions[0];
        if (!comp) return;
        var competitors = comp.competitors || [];
        if (competitors.length < 2) return;
        var home = competitors.find(function(c){return c.homeAway==='home';}) || competitors[0];
        var away = competitors.find(function(c){return c.homeAway==='away';}) || competitors[1];
        var homeName = home.team && (home.team.displayName || home.team.shortDisplayName) || '';
        var awayName = away.team && (away.team.displayName || away.team.shortDisplayName) || '';
        if (!homeName || !awayName) return;

        var homeRec = (home.records && home.records[0] && home.records[0].summary) || '';
        var awayRec = (away.records && away.records[0] && away.records[0].summary) || '';

        // Parse records to determine favorite
        var homeWins = parseInt((homeRec.match(/^(\d+)/)||[])[1]) || 0;
        var awayWins = parseInt((awayRec.match(/^(\d+)/)||[])[1]) || 0;
        var homeLosses = parseInt((homeRec.match(/-(\d+)/)||[])[1]) || 0;
        var awayLosses = parseInt((awayRec.match(/-(\d+)/)||[])[1]) || 0;
        var homePct = (homeWins + homeLosses) > 0 ? homeWins / (homeWins + homeLosses) : 0.5;
        var awayPct = (awayWins + awayLosses) > 0 ? awayWins / (awayWins + awayLosses) : 0.5;
        // Adjust for home court advantage
        var homeEdge = homePct + 0.07;

        // Format the "when" string. ET conversion.
        var whenDate = new Date(gameTs);
        var isTomorrow = whenDate.toDateString() !== now.toDateString();
        var whenStr = (isTomorrow ? 'Tomorrow ' : 'Today ') +
          whenDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York' }) + ' ET';

        var pickTeam, pickDesc, edge, confidence;
        // Alternate bet type so pool isn't all spreads. Hash matchup to pick.
        var hashSeed = (homeName + awayName).split('').reduce(function(a,c){return a + c.charCodeAt(0);}, 0);
        var betType = ['spread', 'moneyline', 'total'][hashSeed % 3];

        if (homeEdge > awayPct + 0.05) {
          // Home favored
          pickTeam = homeName;
          if (betType === 'moneyline') {
            pickDesc = homeName.split(' ').pop() + ' ML';
            edge = homeName + ' at home (' + homeRec + ') vs ' + awayName + ' (' + awayRec + '). Home-court advantage and record differential favor hosts at current price.';
          } else if (betType === 'total') {
            pickDesc = 'Over ' + (r.ep.sport === 'basketball' ? '224.5' : r.ep.sport === 'soccer' ? '2.5 goals' : r.ep.sport === 'baseball' ? '8.5' : '6.5');
            edge = homeName + ' (' + homeRec + ') at home vs ' + awayName + ' (' + awayRec + '). Both offenses trending up in recent matchups; pace and scoring should push totals.';
          } else {
            pickDesc = homeName.split(' ').pop() + ' -3.5';
            edge = homeName + ' favored at home (' + homeRec + ') over ' + awayName + ' (' + awayRec + '). Historical ATS trends favor better-record home sides laying modest numbers.';
          }
          confidence = (homePct - awayPct) > 0.15 ? 'high' : 'medium';
        } else if (awayPct > homePct + 0.1) {
          // Away strongly favored
          pickTeam = awayName;
          if (betType === 'moneyline') {
            pickDesc = awayName.split(' ').pop() + ' ML';
            edge = awayName + ' (' + awayRec + ') road record strong vs ' + homeName + ' (' + homeRec + '). Traveling as favorite is priced reasonably given form gap.';
          } else if (betType === 'total') {
            pickDesc = 'Under ' + (r.ep.sport === 'basketball' ? '218.5' : r.ep.sport === 'soccer' ? '2.5 goals' : r.ep.sport === 'baseball' ? '8.5' : '6.0');
            edge = awayName + ' vs ' + homeName + '. Better team on road often plays slower, controlled pace; defenses set tempo.';
          } else {
            pickDesc = awayName.split(' ').pop() + ' -1.5';
            edge = awayName + ' (' + awayRec + ') on the road favored against ' + homeName + ' (' + homeRec + '). Record gap justifies the laid number.';
          }
          confidence = (awayPct - homePct) > 0.2 ? 'high' : 'medium';
        } else {
          // Close matchup — take the total
          pickDesc = 'Under ' + (r.ep.sport === 'basketball' ? '220.5' : r.ep.sport === 'soccer' ? '2.5 goals' : r.ep.sport === 'baseball' ? '8.5' : '6.5');
          betType = 'total';
          edge = 'Evenly matched: ' + awayName + ' (' + awayRec + ') @ ' + homeName + ' (' + homeRec + '). Close games trend toward grinding, lower-scoring affairs as both sides play tighter defense.';
          confidence = 'medium';
        }

        picksBySport[r.ep.sport].push({
          matchup: awayName + ' @ ' + homeName,
          league: r.ep.league,
          type: betType,
          when: whenStr,
          pick: pickDesc,
          odds: betType === 'moneyline' ? (confidence === 'high' ? '-165' : '-120') : '-110',
          edge: edge,
          confidence: confidence,
          _templateOrigin: true,  // marker so we know these are template picks
        });
      });
    });

    // Take best 2 per sport (by confidence, then first seen)
    var confRank = { high: 3, medium: 2, low: 1 };
    Object.keys(picksBySport).forEach(function(sport) {
      picksBySport[sport].sort(function(a,b){ return (confRank[b.confidence]||0) - (confRank[a.confidence]||0); });
      FALLBACK_PICKS = FALLBACK_PICKS.concat(picksBySport[sport].slice(0, 2));
    });

    console.log('[fallback] generated ' + FALLBACK_PICKS.length + ' template picks from ESPN schedule');
  }

  // ─── Pick grading: match picks against live ESPN scoreboard, compute W/L ───
  // Keeps a running daily record in localStorage indexed by date + pick id.
  // player_prop and first_half picks can't be graded from scoreboard data — they
  // stay "pending" (no badge shown).

  // Maps the `league` field from picks to an ESPN_LEAGUES id. Keys are uppercased
  // before lookup. Accepts both common abbreviations (EPL, UCL) and full names.
  var PICK_LEAGUE_MAP = {
    NBA: 'nba', MLB: 'mlb', NHL: 'nhl', NFL: 'nfl',
    // Soccer — Europe + MLS
    EPL: 'epl', 'PREMIER LEAGUE': 'epl', 'ENGLISH PREMIER LEAGUE': 'epl',
    'LA LIGA': 'laliga', LALIGA: 'laliga',
    BUNDESLIGA: 'bundesliga',
    'SERIE A': 'seriea', SERIEA: 'seriea',
    'LIGUE 1': 'ligue1', LIGUE1: 'ligue1',
    UCL: 'ucl', 'CHAMPIONS LEAGUE': 'ucl', 'UEFA CHAMPIONS LEAGUE': 'ucl',
    MLS: 'mls', SOCCER: 'epl'  // generic "SOCCER" league defaults to EPL scoreboard
  };

  // Which broad sport category a league belongs to. Used to group picks into
  // sections. The order of keys here controls section render order.
  var SPORT_CATEGORIES = [
    { id: 'basketball', label: 'Basketball', leagues: ['NBA'] },
    { id: 'football',   label: 'Football',   leagues: ['NFL'] },
    { id: 'baseball',   label: 'Baseball',   leagues: ['MLB'] },
    { id: 'hockey',     label: 'Hockey',     leagues: ['NHL'] },
    { id: 'soccer',     label: 'Soccer',     leagues: ['EPL','LA LIGA','LALIGA','BUNDESLIGA','SERIE A','SERIEA','LIGUE 1','LIGUE1','UCL','CHAMPIONS LEAGUE','UEFA CHAMPIONS LEAGUE','MLS','PREMIER LEAGUE','ENGLISH PREMIER LEAGUE','SOCCER'] },
  ];

  function sportCategoryForLeague(league) {
    var up = String(league||'').toUpperCase();
    for (var i = 0; i < SPORT_CATEGORIES.length; i++) {
      if (SPORT_CATEGORIES[i].leagues.indexOf(up) !== -1) return SPORT_CATEGORIES[i];
    }
    return { id: 'other', label: 'Other', leagues: [] };
  }
  var pickScoreboardCache = {};

  async function fetchScoreboardForPicks(leagueId) {
    var cached = pickScoreboardCache[leagueId];
    if (cached && Date.now() - cached.ts < 45 * 1000) return cached.events;
    var league = ESPN_LEAGUES.find(function(l){ return l.id === leagueId; });
    if (!league) return [];
    try {
      var res = await fetch(league.url, { signal: AbortSignal.timeout(6000) });
      if (!res.ok) return [];
      var data = await res.json();
      var events = data.events || [];
      pickScoreboardCache[leagueId] = { ts: Date.now(), events: events };
      return events;
    } catch (e) { return []; }
  }

  function normalizePickTeam(s) {
    return String(s||'').toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  // Extract the team name from a pick like "Nuggets ML" / "Avalanche -1.5" / "Knicks +3.5 (1H)"
  function extractTeamFromPickText(pickText) {
    var t = String(pickText||'').trim();
    t = t.replace(/\s*\(1H\).*/i, '');
    t = t.replace(/\s+ML\b.*/i, '');
    t = t.replace(/\s+(?:Over|Under)\s+[\d.]+.*/i, '');
    t = t.replace(/\s*[+-]\d+(?:\.\d+)?.*/, '');
    return t.trim();
  }

  function extractSpreadLine(pickText) {
    var m = String(pickText||'').match(/([+-])(\d+(?:\.\d+)?)/);
    if (!m) return null;
    return (m[1] === '+' ? 1 : -1) * parseFloat(m[2]);
  }

  function extractTotal(pickText) {
    var m = String(pickText||'').match(/(Over|Under)\s+([\d.]+)/i);
    if (!m) return null;
    return { side: m[1].toLowerCase(), line: parseFloat(m[2]) };
  }

  function competitorMatchesPick(competitor, pickTeamName) {
    var team = (competitor && competitor.team) || {};
    var espnNames = [team.displayName, team.name, team.shortDisplayName, team.abbreviation, team.location]
      .filter(Boolean).map(normalizePickTeam);
    var pickNorm = normalizePickTeam(pickTeamName);
    if (!pickNorm) return false;
    return espnNames.some(function(n){
      return n && (n.indexOf(pickNorm) !== -1 || pickNorm.indexOf(n) !== -1);
    });
  }

  // A pick is eligible for live-matching only if its scheduled date is today.
  // "Tomorrow" picks should stay pending even if the same team is playing tonight.
  function isPickForToday(pick) {
    var when = String(pick.when || '').toLowerCase().trim();
    if (!when) return true;          // no when field — assume today
    if (/^tomorrow/.test(when)) return false;
    if (/^today/.test(when))    return true;
    return true;                     // unknown format — fall through
  }

  // Only match against ESPN events happening in the browser's current local day.
  function isEventToday(event) {
    if (!event || !event.date) return false;
    return new Date(event.date).toDateString() === new Date().toDateString();
  }

  function matchPickToEvent(pick, events) {
    if (!pick || !events || events.length === 0) return null;
    if (!isPickForToday(pick)) return null;           // tomorrow-picks stay pending
    var todayEvents = events.filter(isEventToday);    // ignore future/past events
    if (todayEvents.length === 0) return null;

    var matchup = String(pick.matchup||'');
    var mm = matchup.match(/^(.+?)\s+(?:@|vs\.?|at)\s+(.+?)$/i);
    var awayName = mm ? mm[1].trim() : '';
    var homeName = mm ? mm[2].trim() : '';
    var tbdRx = /\(opponent\s*tbd\)|\btbd\b/i;
    if (tbdRx.test(awayName)) awayName = '';
    if (tbdRx.test(homeName)) homeName = '';
    var pickTeam = extractTeamFromPickText(pick.pick);

    for (var i = 0; i < todayEvents.length; i++) {
      var ev = todayEvents[i];
      var comp = ev.competitions && ev.competitions[0];
      var competitors = (comp && comp.competitors) || [];
      if (competitors.length < 2) continue;
      var home = competitors.find(function(c){ return c.homeAway === 'home'; }) || competitors[0];
      var away = competitors.find(function(c){ return c.homeAway === 'away'; }) || competitors[1];

      if (awayName && homeName) {
        if (competitorMatchesPick(away, awayName) && competitorMatchesPick(home, homeName)) return ev;
        if (competitorMatchesPick(home, awayName) && competitorMatchesPick(away, homeName)) return ev;
      } else {
        var known = awayName || homeName || pickTeam;
        if (!known) continue;
        if (competitorMatchesPick(home, known) || competitorMatchesPick(away, known)) return ev;
      }
    }
    return null;
  }

  function getPickStatus(event) {
    var st = event && event.status && event.status.type;
    var name = st && st.name;
    var state = st && st.state;
    if (name === 'STATUS_IN_PROGRESS' || name === 'STATUS_HALFTIME' || name === 'STATUS_END_PERIOD' || state === 'in') return 'live';
    if (name === 'STATUS_FINAL' || name === 'STATUS_FULL_TIME' || state === 'post') return 'final';
    return 'scheduled';
  }

  function getPickResult(pick, event) {
    var type = (pick.type || '').toLowerCase();
    var comp = event.competitions && event.competitions[0];
    var competitors = (comp && comp.competitors) || [];
    if (competitors.length < 2) return null;
    var home = competitors.find(function(c){ return c.homeAway === 'home'; }) || competitors[0];
    var away = competitors.find(function(c){ return c.homeAway === 'away'; }) || competitors[1];
    var homeScore = parseInt(home.score) || 0;
    var awayScore = parseInt(away.score) || 0;
    var total = homeScore + awayScore;

    if (type === 'total') {
      var t = extractTotal(pick.pick);
      if (!t) return null;
      if (total > t.line) return t.side === 'over' ? 'win' : 'loss';
      if (total < t.line) return t.side === 'over' ? 'loss' : 'win';
      return 'push';
    }

    if (type === 'moneyline' || type === 'spread') {
      var pickTeam = extractTeamFromPickText(pick.pick);
      if (!pickTeam) return null;
      var isPickOnHome = competitorMatchesPick(home, pickTeam);
      var isPickOnAway = competitorMatchesPick(away, pickTeam);
      if (!isPickOnHome && !isPickOnAway) return null;
      var pickedScore = isPickOnHome ? homeScore : awayScore;
      var otherScore  = isPickOnHome ? awayScore : homeScore;
      var margin = pickedScore - otherScore;

      if (type === 'moneyline') {
        if (margin > 0) return 'win';
        if (margin < 0) return 'loss';
        return 'push';
      }
      // spread
      var line = extractSpreadLine(pick.pick);
      if (line === null) return null;
      var adj = margin + line;
      if (adj > 0) return 'win';
      if (adj < 0) return 'loss';
      return 'push';
    }

    return null; // player_prop, first_half — can't grade from scoreboard
  }

  // Stable identifier for a pick (survives pick-list refreshes)
  function pickId(p) {
    return String((p.matchup || '') + '|' + (p.pick || '')).replace(/\s+/g, '').toLowerCase();
  }

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' +
           String(d.getMonth()+1).padStart(2,'0') + '-' +
           String(d.getDate()).padStart(2,'0');
  }

  function loadPickHistory() {
    try { return JSON.parse(localStorage.getItem('sb_pick_history') || '{}'); }
    catch(e) { return {}; }
  }

  function savePickResult(pick, result) {
    if (result !== 'win' && result !== 'loss' && result !== 'push') return;
    var hist = loadPickHistory();
    var day = todayStr();
    if (!hist[day]) hist[day] = {};
    var sportId = sportCategoryForLeague(pick.league).id;
    hist[day][pickId(pick)] = {
      result: result,
      sport: sportId,
      matchup: pick.matchup,
      pick: pick.pick,
      savedAt: Date.now()
    };
    // Prune to last 30 days
    var keys = Object.keys(hist).sort();
    while (keys.length > 30) delete hist[keys.shift()];
    try { localStorage.setItem('sb_pick_history', JSON.stringify(hist)); } catch(e) {}
  }

  // Record calculators. sportId of null means "all sports combined".
  function _tallyFromEntries(entries, sportId) {
    var w = 0, l = 0, p = 0;
    Object.keys(entries).forEach(function(k){
      var e = entries[k];
      if (sportId && e.sport !== sportId) return;
      if (e.result === 'win')  w++;
      else if (e.result === 'loss') l++;
      else if (e.result === 'push') p++;
    });
    return { wins: w, losses: l, pushes: p };
  }

  function getTodayRecord(sportId) {
    var hist = loadPickHistory();
    var day = hist[todayStr()] || {};
    return _tallyFromEntries(day, sportId || null);
  }

  function getAllTimeRecord(sportId) {
    var hist = loadPickHistory();
    var w = 0, l = 0, p = 0;
    Object.keys(hist).forEach(function(d){
      var t = _tallyFromEntries(hist[d], sportId || null);
      w += t.wins; l += t.losses; p += t.pushes;
    });
    return { wins: w, losses: l, pushes: p };
  }

  // Render a record strip at a specific element id. sportId of null = overall.
  // liveCount and pendingCount are from the enrichment pass for that slice.
  function renderRecordStripInto(elementId, sportId, liveCount, pendingCount, isOverall) {
    var el = document.getElementById(elementId);
    if (!el) return;
    var today = getTodayRecord(sportId || null);
    var all   = getAllTimeRecord(sportId || null);
    var titleMain = isOverall ? 'Overall' : (SPORT_CATEGORIES.find(function(s){return s.id===sportId;})?.label || 'Section');
    var subtitle;
    if (liveCount > 0) {
      subtitle = '<span class="prs-live-pip">● ' + liveCount + ' LIVE</span>';
    } else if (pendingCount > 0) {
      subtitle = pendingCount + ' Pending';
    } else if (!today.wins && !today.losses && !today.pushes && !all.wins && !all.losses) {
      subtitle = 'No history yet';
    } else {
      subtitle = 'All graded';
    }

    var allTotal = all.wins + all.losses; // pushes excluded from pct
    var winPct = allTotal > 0 ? Math.round((all.wins / allTotal) * 100) : 0;
    var pctClass = allTotal === 0 ? 'prs-pct-even' : (winPct >= 55 ? 'prs-pct-good' : winPct < 50 ? 'prs-pct-bad' : 'prs-pct-even');

    var todayHas = today.wins || today.losses || today.pushes;
    var todayStr = todayHas
      ? '<span class="prs-w">' + today.wins + '</span>–<span class="prs-l">' + today.losses + '</span>' + (today.pushes ? '–<span class="prs-p">' + today.pushes + '</span>' : '')
      : '—';

    var allHas = all.wins || all.losses;
    var allStr = allHas
      ? '<span class="prs-w">' + all.wins + '</span>–<span class="prs-l">' + all.losses + '</span>' + (all.pushes ? '–<span class="prs-p">' + all.pushes + '</span>' : '')
      : '—';

    var pctStr = allHas ? '<span class="' + pctClass + '">' + winPct + '%</span>' : '—';

    // Allow clicks only when there is history to show
    var clickable = (today.wins + today.losses + today.pushes + all.wins + all.losses + all.pushes) > 0;
    var emptyAttr = clickable ? '' : ' data-empty="1"';
    var clickHandler = clickable ? ' onclick="openPickHistory(\'' + (sportId || '') + '\', ' + (isOverall ? 'true' : 'false') + ')"' : '';

    el.className = 'picks-record-strip' + (isOverall ? ' is-overall' : '');
    el.setAttribute('style', '--winpct:' + winPct + '%');
    if (!clickable) el.setAttribute('data-empty', '1');
    else el.removeAttribute('data-empty');
    // Re-attach click by replacing the element's onclick attribute
    el.onclick = clickable ? function() { openPickHistory(sportId || '', !!isOverall); } : null;

    el.innerHTML =
      '<div class="prs-cell-title">' +
        '<div class="prs-title-main">' + esc(titleMain) + '</div>' +
        '<div class="prs-title-sub">' + subtitle + '</div>' +
      '</div>' +
      '<div class="prs-cell">' +
        '<div class="prs-cell-label">Today</div>' +
        '<div class="prs-cell-value">' + todayStr + '</div>' +
        '<div class="prs-cell-sub">W–L' + (today.pushes ? '–P' : '') + '</div>' +
      '</div>' +
      '<div class="prs-cell">' +
        '<div class="prs-cell-label">All-time</div>' +
        '<div class="prs-cell-value">' + allStr + '</div>' +
        '<div class="prs-cell-sub">W–L' + (all.pushes ? '–P' : '') + '</div>' +
      '</div>' +
      '<div class="prs-cell">' +
        '<div class="prs-cell-label">Hit Rate</div>' +
        '<div class="prs-cell-value">' + pctStr + '</div>' +
        '<div class="prs-cell-sub">' + (allTotal > 0 ? allTotal + ' graded' : '—') + '</div>' +
      '</div>' +
      (clickable ? '<div class="prs-expand">View <span class="prs-expand-chev">▸</span></div>' : '');
  }

  // Back-compat wrapper so other call sites don't break.
  function renderRecordStrip(liveCount, pendingCount) {
    renderRecordStripInto('picks-record-strip-overall', null, liveCount, pendingCount, true);
  }

  // ─── Pick history modal ────────────────────────────────────────────────────
  function openPickHistory(sportId, isOverall) {
    var content = document.getElementById('ph-content');
    var overlay = document.getElementById('ph-overlay');
    if (!content || !overlay) return;
    var titleMain = isOverall ? 'All Picks' : (SPORT_CATEGORIES.find(function(s){return s.id===sportId;})?.label || 'Picks');
    var hist = loadPickHistory();
    var today = getTodayRecord(isOverall ? null : sportId);
    var all   = getAllTimeRecord(isOverall ? null : sportId);
    var allTotal = all.wins + all.losses;
    var winPct = allTotal > 0 ? Math.round((all.wins / allTotal) * 100) : 0;
    var pctClass = allTotal === 0 ? 'ph-stat-value' : (winPct >= 55 ? 'ph-stat-value prs-pct-good' : winPct < 50 ? 'ph-stat-value prs-pct-bad' : 'ph-stat-value prs-pct-even');

    // Build history rows grouped by day (newest first)
    var days = Object.keys(hist).sort().reverse();
    var bodyHtml = '';
    var emittedEntries = 0;
    days.forEach(function(day) {
      var dayEntries = hist[day];
      var filtered = Object.keys(dayEntries)
        .map(function(k){ return Object.assign({ id: k }, dayEntries[k]); })
        .filter(function(e){ return isOverall || e.sport === sportId; })
        .sort(function(a,b){ return (b.savedAt||0) - (a.savedAt||0); });
      if (filtered.length === 0) return;

      var dayW = filtered.filter(function(e){return e.result==='win';}).length;
      var dayL = filtered.filter(function(e){return e.result==='loss';}).length;
      var dayP = filtered.filter(function(e){return e.result==='push';}).length;
      var dayStr = '<span class="prs-w">' + dayW + 'W</span>–<span class="prs-l">' + dayL + 'L</span>' + (dayP ? '–<span class="prs-p">' + dayP + 'P</span>' : '');

      // Format day label
      var d = new Date(day + 'T12:00:00');
      var now = new Date();
      var dayLabel;
      var diffDays = Math.round((now.setHours(12,0,0,0) - d.getTime()) / 86400000);
      if (diffDays === 0) dayLabel = 'Today';
      else if (diffDays === 1) dayLabel = 'Yesterday';
      else dayLabel = d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});

      bodyHtml += '<div class="ph-day-group">' +
        '<div class="ph-day-label">' + esc(dayLabel) + ' <span class="ph-day-summary">' + dayStr + '</span></div>' +
        filtered.map(function(e) {
          var badgeCls = e.result === 'win' ? 'won' : e.result === 'loss' ? 'lost' : 'push';
          var badgeTxt = e.result === 'win' ? 'Won' : e.result === 'loss' ? 'Lost' : 'Push';
          return '<div class="ph-entry">' +
            '<div class="ph-entry-badge ' + badgeCls + '">' + badgeTxt + '</div>' +
            '<div class="ph-entry-body">' +
              '<div class="ph-entry-pick">' + esc(e.pick || '—') + '</div>' +
              '<div class="ph-entry-matchup">' + esc(e.matchup || '') + '</div>' +
            '</div>' +
          '</div>';
        }).join('') +
      '</div>';
      emittedEntries += filtered.length;
    });
    if (emittedEntries === 0) bodyHtml = '<div class="ph-empty">No graded picks yet. Results will appear here after games finish.</div>';

    content.innerHTML =
      '<div class="ph-header">' +
        '<div>' +
          '<div class="ph-title-sport">' + (isOverall ? 'All Sports' : esc(titleMain)) + ' History</div>' +
          '<div class="ph-title">' + esc(titleMain) + '</div>' +
        '</div>' +
        '<button class="ph-close" onclick="closePickHistory()">Close ✕</button>' +
      '</div>' +
      '<div class="ph-stats-bar">' +
        '<div class="ph-stat"><div class="ph-stat-value prs-w">' + all.wins + '</div><div class="ph-stat-label">Wins</div></div>' +
        '<div class="ph-stat"><div class="ph-stat-value prs-l">' + all.losses + '</div><div class="ph-stat-label">Losses</div></div>' +
        '<div class="ph-stat"><div class="ph-stat-value prs-p">' + all.pushes + '</div><div class="ph-stat-label">Pushes</div></div>' +
        '<div class="ph-stat"><div class="' + pctClass + '">' + (allTotal > 0 ? winPct + '%' : '—') + '</div><div class="ph-stat-label">Hit Rate</div></div>' +
      '</div>' +
      '<div class="ph-body">' + bodyHtml + '</div>';
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closePickHistory(ev) {
    // If called from the overlay click handler, only close if click was on the backdrop
    if (ev && ev.target && ev.target.id !== 'ph-overlay' && typeof ev.stopPropagation !== 'undefined') return;
    var overlay = document.getElementById('ph-overlay');
    if (overlay) overlay.classList.remove('open');
    document.body.style.overflow = '';
  }
  // ESC key closes modal
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePickHistory();
  });

  // Build a compact score readout for a live or final game — "AWAY 2 — 3 HOME · 2nd 5:30"
  // For player_prop picks, append a note that per-player live stats aren't available.
  function getLiveReadout(pick, event) {
    var comp = event && event.competitions && event.competitions[0];
    var competitors = (comp && comp.competitors) || [];
    if (competitors.length < 2) return '';
    var home = competitors.find(function(c){ return c.homeAway === 'home'; }) || competitors[0];
    var away = competitors.find(function(c){ return c.homeAway === 'away'; }) || competitors[1];
    var homeScore = parseInt(home.score) || 0;
    var awayScore = parseInt(away.score) || 0;
    var homeAbbr = (home.team && (home.team.abbreviation || home.team.shortDisplayName)) || 'HOME';
    var awayAbbr = (away.team && (away.team.abbreviation || away.team.shortDisplayName)) || 'AWAY';

    var status = event.status;
    var clockStr = '';
    if (status && status.type) {
      // Prefer shortDetail (e.g. "Q3 2:45" or "Top 6th" or "Final"); fall back to period+clock
      clockStr = status.type.shortDetail || status.type.detail ||
                 (status.period && status.displayClock ? ('P' + status.period + ' ' + status.displayClock) : '');
    }

    var core = awayAbbr + ' ' + awayScore + ' — ' + homeScore + ' ' + homeAbbr +
               (clockStr ? '  ·  ' + clockStr : '');

    var type = (pick.type || '').toLowerCase();
    if (type === 'player_prop') {
      core += '  ·  <span style="color:var(--ink-3);">live player stats unavailable</span>';
    }
    return core;
  }

  function updatePickStatusBadge(idx, status, result, readout) {
    var row = document.querySelector('[data-pick-idx="' + idx + '"]');
    if (!row) return;
    var badge = row.querySelector('.pick-status');
    if (badge) {
      if (status === 'live') {
        badge.className = 'pick-status badge-live';
        badge.textContent = '● LIVE';
      } else if (status === 'final' && result) {
        var cls = result === 'win' ? 'badge-won' : result === 'loss' ? 'badge-lost' : 'badge-push';
        badge.className = 'pick-status ' + cls;
        badge.textContent = result === 'push' ? 'PUSH' : result === 'win' ? 'WON' : 'LOST';
      } else {
        badge.className = 'pick-status';
        badge.textContent = '';
      }
    }
    var readoutEl = row.querySelector('.pick-live-readout');
    if (readoutEl) {
      if (readout && (status === 'live' || status === 'final')) {
        readoutEl.innerHTML = readout;
        readoutEl.style.display = 'block';
      } else {
        readoutEl.innerHTML = '';
        readoutEl.style.display = 'none';
      }
    }
  }

  // After rendering picks, asynchronously fetch scoreboards for each pick's league,
  // match picks to events, and update badges + record strip in place.
  async function enrichPicksWithStatus(picks) {
    var leagues = Array.from(new Set(picks.map(function(p){
      return PICK_LEAGUE_MAP[(p.league || '').toUpperCase()];
    }))).filter(Boolean);
    if (leagues.length === 0) {
      renderRecordStripInto('picks-record-strip-overall', null, 0, picks.length, true);
      return;
    }

    var boards = await Promise.all(leagues.map(fetchScoreboardForPicks));
    var eventsByLeague = {};
    leagues.forEach(function(lg, i){ eventsByLeague[lg] = boards[i]; });

    // Tally live/pending by sport id + overall
    var liveBySport = {}, pendingBySport = {};
    var overallLive = 0, overallPending = 0;

    picks.forEach(function(pick, idx) {
      var sportId = sportCategoryForLeague(pick.league).id;
      var lg = PICK_LEAGUE_MAP[(pick.league || '').toUpperCase()];
      if (!lg) {
        pendingBySport[sportId] = (pendingBySport[sportId]||0) + 1;
        overallPending++;
        return;
      }
      var events = eventsByLeague[lg] || [];
      var event = matchPickToEvent(pick, events);
      if (!event) {
        pendingBySport[sportId] = (pendingBySport[sportId]||0) + 1;
        overallPending++;
        return;
      }
      var status = getPickStatus(event);
      var result = null;
      var readout = null;
      if (status === 'final') {
        result = getPickResult(pick, event);
        if (result) savePickResult(pick, result);
        readout = getLiveReadout(pick, event);
      } else if (status === 'live') {
        readout = getLiveReadout(pick, event);
      }
      if (status === 'live') {
        liveBySport[sportId] = (liveBySport[sportId]||0) + 1;
        overallLive++;
      }
      if (status === 'scheduled' || (status === 'final' && !result)) {
        pendingBySport[sportId] = (pendingBySport[sportId]||0) + 1;
        overallPending++;
      }
      updatePickStatusBadge(idx, status, result, readout);
    });

    // Overall strip
    renderRecordStripInto('picks-record-strip-overall', null, overallLive, overallPending, true);
    // Per-sport strips — render for every strip element present in the DOM
    ['basketball','football','baseball','hockey','soccer'].forEach(function(sportId) {
      if (document.getElementById('picks-record-strip-' + sportId)) {
        renderRecordStripInto('picks-record-strip-' + sportId, sportId,
          liveBySport[sportId]||0, pendingBySport[sportId]||0, false);
      }
    });
  }

  // Strip picks whose scheduled game has already started more than 4 hours ago.
  // Prevents stale hardcoded / cached picks from showing as "Tomorrow" after the
  // day rolls over. Picks without a parseable "when" field pass through untouched.
  function filterFreshPicks(picks) {
    var now = new Date();
    return picks.filter(function(p) {
      var when = String(p.when||'').trim();
      if (!when) return true;
      // Parse "Today H:MM AM/PM ET" or "Tomorrow H:MM AM/PM ET"
      var m = when.match(/^(Today|Tomorrow)\s+(\d{1,2}):(\d{2})\s*(AM|PM)\s*ET$/i);
      if (!m) return true; // unknown format — don't filter
      var dayOffset = /tomorrow/i.test(m[1]) ? 1 : 0;
      var hour = parseInt(m[2], 10);
      var min = parseInt(m[3], 10);
      if (/PM/i.test(m[4]) && hour < 12) hour += 12;
      if (/AM/i.test(m[4]) && hour === 12) hour = 0;
      // Compute the pick's scheduled time in ET, but compare in local time:
      // approximate ET as UTC-4/UTC-5 by using the browser's own interpretation
      // of "today at that hour" — good enough for 4h staleness.
      var scheduled = new Date();
      scheduled.setDate(scheduled.getDate() + dayOffset);
      scheduled.setHours(hour, min, 0, 0);
      var staleThreshold = new Date(now.getTime() - 4 * 60 * 60 * 1000);
      return scheduled > staleThreshold;
    });
  }

  async function renderPicksFeed() {
    var feed = document.getElementById('main-feed');
    // If real backend picks exist, use them. Otherwise fetch templates from today's ESPN schedule.
    var rawPicks = (PICKS && PICKS.length > 0) ? PICKS : [];
    if (rawPicks.length === 0) {
      // Show a transient "loading picks" state while we build fallbacks
      if (!_fallbackFetched) {
        feed.innerHTML = '<div class="cluster" style="padding:20px 0;"><div style="color:var(--ink-3);font-size:13px;font-family:JetBrains Mono,monospace;">Loading today\'s picks…</div></div>';
        await ensureFallbackPicks();
      }
      rawPicks = FALLBACK_PICKS;
    }
    var picks = filterFreshPicks(rawPicks);
    var hasAnyPicks = picks && picks.length > 0;

    var confColor = { high: 'var(--green)', medium: 'var(--amber)', low: 'var(--ink-3)' };
    var confBg    = { high: 'var(--green-light)', medium: 'var(--amber-light)', low: 'var(--surface-2)' };
    var neutralType = { fg: 'var(--ink-2)', bg: 'var(--surface-2)' };
    var typeInfo = {
      spread:      Object.assign({ label: 'Spread'      }, neutralType),
      moneyline:   Object.assign({ label: 'Moneyline'   }, neutralType),
      total:       Object.assign({ label: 'Total'       }, neutralType),
      player_prop: Object.assign({ label: 'Player Prop' }, neutralType),
      first_half:  Object.assign({ label: '1st Half'    }, neutralType)
    };

    // Group picks by sport category, preserving original indices (used by the
    // enrichment pass to update badges via data-pick-idx).
    var bySport = {};
    picks.forEach(function(p, idx) {
      var sport = sportCategoryForLeague(p.league).id;
      if (!bySport[sport]) bySport[sport] = [];
      bySport[sport].push({ pick: p, idx: idx });
    });
    // Order: Basketball, Football, Baseball, Hockey, Soccer, then Other
    var orderedSportIds = SPORT_CATEGORIES.map(function(s){ return s.id; }).concat(['other']);

    function renderPickRow(p, idx) {
      var conf  = (p.confidence || 'medium').toLowerCase();
      var color = confColor[conf] || confColor.medium;
      var bg    = confBg[conf]    || confBg.medium;
      var t     = typeInfo[(p.type || '').toLowerCase()] || { label: 'Pick', fg: 'var(--ink-2)', bg: 'var(--surface-2)' };
      var typeTag = '<span style="display:inline-block;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:3px;background:' + t.bg + ';color:' + t.fg + ';">' + esc(t.label) + '</span>';
      var leaguePrefix = p.league ? '<span style="font-family:JetBrains Mono,monospace;font-size:9px;color:var(--ink-3);letter-spacing:.08em;margin-right:6px;">' + esc(p.league) + '</span>' : '';
      return '<div data-pick-idx="' + idx + '" style="padding:16px 0;border-bottom:1px solid var(--rule);">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:12px;flex-wrap:wrap;">' +
          '<div style="font-family:JetBrains Mono,monospace;font-size:10px;color:var(--ink-3);">' + leaguePrefix + esc(p.matchup||'') + '</div>' +
          (p.when ? '<div style="font-family:JetBrains Mono,monospace;font-size:10px;color:var(--green);">' + esc(p.when) + '</div>' : '') +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;">' +
          '<span style="font-family:Archivo,sans-serif;font-size:20px;font-weight:700;color:var(--ink);">' + esc(p.pick||'') + '</span>' +
          '<span style="font-family:JetBrains Mono,monospace;font-size:13px;font-weight:600;color:var(--ink-2);">' + esc(p.odds||'') + '</span>' +
          typeTag +
          '<span class="pick-status"></span>' +
          '<span style="display:inline-block;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:3px;background:' + bg + ';color:' + color + ';">' + esc(conf) + ' confidence</span>' +
        '</div>' +
        '<div class="pick-live-readout" style="display:none;"></div>' +
        '<div style="font-size:13px;color:var(--ink-2);line-height:1.6;max-width:95%;">' + esc(p.edge||'') + '</div>' +
      '</div>';
    }

    // Overall strip at the very top
    var html = '<div class="cluster" style="padding-top:4px;">' +
      '<div id="picks-record-strip-overall" class="picks-record-strip picks-record-strip-overall"><span class="picks-record-label">Overall</span></div>';

    orderedSportIds.forEach(function(sportId) {
      var group = bySport[sportId];
      var sportDef = SPORT_CATEGORIES.find(function(s){ return s.id === sportId; }) || { id: sportId, label: 'Other' };
      // Always render a section for core sports (basketball/football/baseball/hockey/soccer);
      // show empty state when nothing available today. Skip 'other' when empty.
      var isCore = sportDef && ['basketball','football','baseball','hockey','soccer'].indexOf(sportId) !== -1;
      var hasPicks = group && group.length > 0;
      if (!hasPicks && !isCore) return;

      var countLabel = hasPicks
        ? group.length + ' pick' + (group.length===1?'':'s')
        : 'No picks today';

      html += '<section class="picks-sport-section">' +
        '<div class="picks-sport-header">' +
          '<span class="picks-sport-label">' + esc(sportDef.label) + '</span>' +
          '<span class="picks-sport-count">' + countLabel + '</span>' +
        '</div>' +
        '<div id="picks-record-strip-' + sportId + '" class="picks-record-strip"></div>' +
        (hasPicks
          ? group.map(function(g){ return renderPickRow(g.pick, g.idx); }).join('')
          : '<div style="padding:14px 4px 18px;color:var(--ink-3);font-size:13px;line-height:1.5;">No ' + esc(sportDef.label.toLowerCase()) + ' picks cleared research this cycle. The next refresh (every 2h) may surface new ones — or yesterday\'s ' + esc(sportDef.label.toLowerCase()) + ' results should populate below shortly if games finished overnight.</div>'
        ) +
      '</section>';
    });

    var isTemplate = picks.length > 0 && picks[0]._templateOrigin;
    var footerNote = isTemplate
      ? 'Template picks from today\'s schedule. Research-backed picks refresh every 2h — check back for upgraded selections.'
      : 'For entertainment only. Please bet responsibly.';
    html += '<div style="font-size:10px;color:var(--ink-3);margin-top:20px;font-family:JetBrains Mono,monospace;">' + footerNote + '</div>' +
    '</div>';
    feed.innerHTML = html;

    // Paint all record strips once with persisted data, so they're populated
    // even before the live enrichment completes.
    renderRecordStripInto('picks-record-strip-overall', null, 0, 0, true);
    // Core sports always have strips rendered in the DOM
    ['basketball','football','baseball','hockey','soccer'].forEach(function(sportId) {
      if (document.getElementById('picks-record-strip-' + sportId)) {
        renderRecordStripInto('picks-record-strip-' + sportId, sportId, 0, 0, false);
      }
    });

    enrichPicksWithStatus(hasAnyPicks ? picks : []);
  }

  // Fallback when stories.json has no highlights yet. Each league uses its channel's
  // "uploads" playlist (UU-prefix of the UC channel ID from generate.js), so the
  // embed always plays the latest upload — no stale videoId problems.
  // NFL's official channel blocks embedding, so we point to "NFL on ESPN" instead.
  // SOCCER uses ESPN FC — ESPN's global soccer home, heavy on Premier League,
  // Champions League, La Liga, MLS.
  var DEFAULT_HIGHLIGHTS = [
    { league: 'NBA',    title: 'Latest NBA highlights',                 videoId: '', playlistId: 'UUWJ2lWNubArHWmf3FIHbfcQ', timeAgo: 'Latest' },
    { league: 'NFL',    title: 'Latest NFL news (via ESPN)',            videoId: '', playlistId: 'UUiio0ydw439X13KyZgMIcHw', timeAgo: 'Latest' },
    { league: 'MLB',    title: 'Latest MLB highlights',                 videoId: '', playlistId: 'UUoLrcjPV5PbUrUyXq5mjc_A', timeAgo: 'Latest' },
    { league: 'NHL',    title: 'Latest NHL highlights',                 videoId: '', playlistId: 'UUqFMzb-4AUf6WAIbl132QKA', timeAgo: 'Latest' },
    { league: 'WNBA',   title: 'Latest WNBA highlights',                videoId: '', playlistId: 'UUO9a_ryN_l7DIDS-VIt-zmw', timeAgo: 'Latest' },
    { league: 'SOCCER', title: 'Latest global soccer (ESPN FC)',        videoId: '', playlistId: 'UU6c1z7bA__85CIWZ_jpCK-Q', timeAgo: 'Latest' },
  ];

  function renderHighlightsFeed() {
    var feed = document.getElementById('main-feed');

    // Merge real videos from stories.json with defaults
    var realByLeague = {};
    (HIGHLIGHTS || []).forEach(function(v) { realByLeague[v.league] = v; });
    var vids = DEFAULT_HIGHLIGHTS.map(function(def) {
      return realByLeague[def.league] || def;
    });
    var leagueColors = { NFL:'#d4200c', NBA:'#1d428a', MLB:'#002d72', NHL:'#003f7f', WNBA:'#ff6900', SOCCER:'#00843d', ESPN:'#cc0000' };

    function buildSrc(v) {
      var base = 'https://www.youtube-nocookie.com/embed';
      if (v.videoId) {
        return base + '/' + v.videoId + '?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1';
      }
      var pid = v.playlistId || 'UUWJ2lWNubArHWmf3FIHbfcQ';
      var idx = v.startIndex || 0;
      return base + '?listType=playlist&list=' + pid + '&autoplay=1&mute=1&controls=1&rel=0&modestbranding=1&index=' + idx;
    }

    function buildDots() {
      return vids.map(function(v, i) {
        var color = leagueColors[v.league] || '#333';
        return '<button onclick="switchVid(' + i + ')" id="dot' + i + '" style="' +
          'border:none;cursor:pointer;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.06em;' +
          'background:' + (i === 0 ? color : 'var(--rule)') + ';' +
          'color:' + (i === 0 ? '#fff' : 'var(--ink-3)') + ';' +
          'transition:all .2s;">' + v.league + '</button>';
      }).join('');
    }

    feed.innerHTML =
      '<div style="max-width:860px;">' +
        '<div style="border-radius:10px;overflow:hidden;background:#000;margin-bottom:12px;">' +
          '<iframe id="hl-frame" src="' + buildSrc(vids[0]) + '" ' +
            'style="width:100%;aspect-ratio:16/9;border:none;display:block;" ' +
            'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" ' +
            'allowfullscreen></iframe>' +
        '</div>' +
        '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">' + buildDots() + '</div>' +
        '<div id="hl-title" style="font-size:13px;font-weight:600;color:var(--ink-2);">' + esc(vids[0].title) + '</div>' +
        '<div style="font-size:10px;color:var(--ink-3);margin-top:6px;font-family:JetBrains Mono,monospace;">Videos play muted — click speaker icon to unmute</div>' +
      '</div>';

    window.__hlVids = vids;
    window.__hlColors = leagueColors;
    window.__buildHlSrc = buildSrc;
  }

  function switchVid(idx) {
    var vids = window.__hlVids;
    var colors = window.__hlColors;
    var buildSrc = window.__buildHlSrc;
    if (!vids || !buildSrc) return;
    var v = vids[idx];
    var frame = document.getElementById('hl-frame');
    if (frame) frame.src = buildSrc(v);
    var title = document.getElementById('hl-title');
    if (title) title.textContent = v.title;
    // Update dot styles
    vids.forEach(function(vid, i) {
      var dot = document.getElementById('dot' + i);
      if (!dot) return;
      var col = colors[vid.league] || '#333';
      dot.style.background = i === idx ? col : 'var(--rule)';
      dot.style.color = i === idx ? '#fff' : 'var(--ink-3)';
    });
  }

    var sidebarStore = [];

  function renderSidebar(data) {
    var sidebar = data.sidebar || [];
    sidebarStore = sidebar;
    function item(i, idx) {
      return '<div class="sidebar-item" style="cursor:pointer;" onclick="openSidebarByIndex('+idx+')">'+
        '<div class="sb-dot"></div>'+
        '<div class="sb-text">'+esc(i.headline)+'<span class="sb-src">'+esc(i.source||'')+'</span></div>'+
      '</div>';
    }
    document.getElementById('sidebar-quick').innerHTML = sidebar.slice(0,5).map(function(it,i){return item(it,i);}).join('');
    var ms = document.getElementById('sidebar-move-section');
    if (sidebar.length > 5) {
      document.getElementById('sidebar-move').innerHTML = sidebar.slice(5,10).map(function(it,i){return item(it,i+5);}).join('');
      ms.style.display = '';
    } else { ms.style.display = 'none'; }
  }

  function renderTicker(data) {
    var ticker = document.getElementById('ticker-inner');
    if (!ticker || !data || !data.clusters) return;
    var items = (data.clusters||[]).map(function(cl) { return cl.leadHeadline; });
    if (data.sidebar) items = items.concat((data.sidebar||[]).map(function(s){return s.headline;}));
    ticker.innerHTML = items.filter(Boolean).map(function(h) {
      return '<span class="ticker-item">' + esc(h) + '</span>';
    }).join(' <span class="ticker-sep">·</span> ');
  }

  // Live draft pick tracker — reads from stories.json, populated by generate.js
  // which fetches ESPN's Core API server-side (no CORS issues there) and resolves
  // team + athlete refs. Falls back to Claude-extracted news picks if ESPN is unreachable.
  // Collapsible: header strip by default, full grid on click. Preference persisted.
  function renderDraftTracker(data) {
    var banner = document.getElementById('draft-tracker');
    if (!banner) return;
    var dt = data && data.draftTracker;
    if (!dt || !dt.active || !Array.isArray(dt.picks) || dt.picks.length === 0) {
      banner.style.display = 'none';
      banner.innerHTML = '';
      return;
    }
    var picks = dt.picks.slice().sort(function(a,b){return (a.pick||999)-(b.pick||999);});
    var sourceLabel = dt.source === 'espn' ? 'ESPN live feed' : dt.source === 'news' ? 'Extracted from news' : '';
    // Latest pick = highest pick number, for the collapsed-state preview
    var latest = picks[picks.length - 1];
    var latestPreview = latest ? (
      '<span class="dt-latest">' +
        '<span class="dt-latest-num">#' + (latest.pick || '?') + '</span>' +
        esc(latest.team || '') + ' — ' + esc(latest.player || '') +
        (latest.position ? ' <span style="color:rgba(255,255,255,0.45)">(' + esc(latest.position) + ')</span>' : '') +
      '</span>'
    ) : '';

    // Collapsed by default; honor saved preference
    var isExpanded = localStorage.getItem('sb_draft_expanded') === '1';

    var html =
      '<div class="dt-header" onclick="toggleDraftTracker()">' +
        '<span class="dt-live">● LIVE</span>' +
        '<span class="dt-title">' + esc(dt.event || 'NFL Draft') + '</span>' +
        '<span class="dt-count">' + picks.length + ' pick' + (picks.length===1?'':'s') +
          (sourceLabel ? ' · ' + esc(sourceLabel) : '') + '</span>' +
        latestPreview +
        '<span class="dt-toggle">' +
          '<span class="dt-toggle-label">' + (isExpanded ? 'Hide' : 'View all') + '</span>' +
          '<span class="dt-chevron">▼</span>' +
        '</span>' +
      '</div>' +
      '<div class="dt-list">' +
        picks.map(function(p) {
          var num = p.pick ? '#' + p.pick : '?';
          var roundLabel = p.round ? 'Round ' + p.round : '';
          var school = p.school ? ' <span class="dt-school">· ' + esc(p.school) + '</span>' : '';
          return '<div class="dt-pick">' +
            '<div class="dt-num">' + num +
              (roundLabel ? '<span class="dt-num-round">' + esc(roundLabel) + '</span>' : '') +
            '</div>' +
            '<div class="dt-body">' +
              '<div class="dt-player">' + esc(p.player||'TBD') +
                (p.position ? '<span class="dt-pos">' + esc(p.position) + '</span>' : '') +
              '</div>' +
              '<div class="dt-team">→ ' + esc(p.team||'') + school + '</div>' +
              (p.note ? '<div class="dt-note">' + esc(p.note) + '</div>' : '') +
            '</div>' +
          '</div>';
        }).join('') +
      '</div>';
    banner.innerHTML = html;
    banner.className = 'draft-tracker ' + (isExpanded ? 'expanded' : 'collapsed');
    banner.style.display = 'block';
  }

  function toggleDraftTracker() {
    var banner = document.getElementById('draft-tracker');
    if (!banner) return;
    var isExpanded = banner.classList.contains('expanded');
    var nextExpanded = !isExpanded;
    banner.classList.toggle('expanded', nextExpanded);
    banner.classList.toggle('collapsed', !nextExpanded);
    localStorage.setItem('sb_draft_expanded', nextExpanded ? '1' : '0');
    var label = banner.querySelector('.dt-toggle-label');
    if (label) label.textContent = nextExpanded ? 'Hide' : 'View all';
  }

  // ─── Client-side ESPN draft feed (real-time during active draft) ──────────
  // Fetches directly from ESPN Core API so picks appear in the browser without
  // waiting for the 2-hour cron. Mirrors the server-side fetchNflDraftLive()
  // logic. Caches for 60s, polls every 90s while banner is showing.
  var liveDraftCache = { ts: 0, data: null };
  var LIVE_DRAFT_TTL_MS = 60 * 1000;
  var draftTimer = null;

  async function fetchLiveDraft() {
    if (liveDraftCache.data && Date.now() - liveDraftCache.ts < LIVE_DRAFT_TTL_MS) {
      return liveDraftCache.data;
    }
    var year = new Date().getFullYear();
    var candidates = [year, year - 1];

    async function fetchJson(url) {
      try {
        var r = await fetch(url.replace(/^http:/, 'https:'), { signal: AbortSignal.timeout(8000) });
        if (!r.ok) return null;
        return await r.json();
      } catch (e) { return null; }
    }

    var rounds = null, pickedYear = null;
    for (var i = 0; i < candidates.length; i++) {
      var y = candidates[i];
      var url = 'https://sports.core.api.espn.com/v2/sports/football/leagues/nfl/seasons/' + y + '/draft/rounds?limit=300';
      console.log('[draft] fetching', url);
      var data = await fetchJson(url);
      if (!data || !Array.isArray(data.items)) { console.warn('[draft] no rounds for', y); continue; }
      var totalListed = data.items.reduce(function(n, r){ return n + (Array.isArray(r.picks) ? r.picks.length : 0); }, 0);
      console.log('[draft] year', y, ':', data.items.length, 'rounds,', totalListed, 'picks listed');
      if (totalListed > 0) { rounds = data; pickedYear = y; break; }
    }
    if (!rounds) { console.warn('[draft] all years empty'); return null; }

    // Filter by ref-presence (permissive) rather than status name
    var rawPicks = [];
    for (var r = 0; r < rounds.items.length; r++) {
      var round = rounds.items[r];
      var roundNum = round.number || 1;
      var picks = round.picks;
      if (picks && picks.$ref && !Array.isArray(picks)) {
        var sub = await fetchJson(picks.$ref);
        picks = sub && sub.items || [];
      }
      if (!Array.isArray(picks)) continue;
      for (var j = 0; j < picks.length; j++) {
        var p = picks[j];
        if (p && p.$ref && !p.status && !p.overall) {
          p = await fetchJson(p.$ref);
          if (!p) continue;
        }
        var teamRef    = p && p.team    && p.team.$ref;
        var athleteRef = p && p.athlete && p.athlete.$ref;
        if (teamRef && athleteRef) {
          rawPicks.push({
            pick:       p.overall || p.pick || null,
            round:      roundNum,
            teamRef:    teamRef,
            athleteRef: athleteRef,
            tradeNote:  p.tradeNote || '',
          });
        }
      }
    }
    console.log('[draft] pickable:', rawPicks.length);
    if (rawPicks.length === 0) {
      var emptyOut = { active: false, event: '', picks: [], source: 'espn' };
      liveDraftCache = { ts: Date.now(), data: emptyOut };
      return emptyOut;
    }

    var resolved = [];
    var BATCH = 12;
    for (var bi = 0; bi < rawPicks.length; bi += BATCH) {
      var batch = rawPicks.slice(bi, bi + BATCH);
      var results = await Promise.all(batch.map(async function(p) {
        var teamP    = p.teamRef    ? fetchJson(p.teamRef)    : null;
        var athleteP = p.athleteRef ? fetchJson(p.athleteRef) : null;
        var team = await teamP, ath = await athleteP;
        var playerName = '';
        if (ath) {
          playerName = ath.fullName || ath.displayName || '';
          if (!playerName && (ath.firstName || ath.lastName)) {
            playerName = ((ath.firstName||'') + ' ' + (ath.lastName||'')).trim();
          }
        }
        return {
          pick:     p.pick,
          round:    p.round,
          team:     team ? (team.displayName || team.name || team.shortDisplayName || '') : '',
          player:   playerName,
          position: ath && ath.position ? (ath.position.abbreviation || ath.position.name || '') : '',
          school:   ath && ath.college  ? (ath.college.name || '') : '',
          note:     p.tradeNote ? 'Trade: ' + p.tradeNote : '',
        };
      }));
      resolved = resolved.concat(results);
    }

    var clean = resolved.filter(function(p) { return p && p.team && p.player; });
    clean.sort(function(a,b){ return (a.pick||999) - (b.pick||999); });
    console.log('[draft] resolved', clean.length, 'picks with names');

    var out = {
      active: clean.length > 0,
      event:  pickedYear + ' NFL Draft',
      picks:  clean,
      source: 'espn',
    };
    liveDraftCache = { ts: Date.now(), data: out };
    return out;
  }

  async function refreshDraftTracker() {
    var live = await fetchLiveDraft();
    if (live && live.picks && live.picks.length > 0) {
      renderDraftTracker({ draftTracker: live });
    } else if (allData && allData.draftTracker && allData.draftTracker.active) {
      // Server-side generate.js already populated draftTracker in stories.json
      // — either from its own ESPN fetch or from news extraction. Render as-is
      // but ensure source is labeled if missing.
      var fallback = Object.assign({}, allData.draftTracker);
      if (!fallback.source) fallback.source = 'news';
      renderDraftTracker({ draftTracker: fallback });
    } else {
      renderDraftTracker({ draftTracker: { active: false, picks: [] } });
    }
    // Poll while banner is visible — picks trickle in every few minutes during a live round
    var banner = document.getElementById('draft-tracker');
    var visible = banner && banner.style.display !== 'none';
    if (visible && !draftTimer) {
      draftTimer = setInterval(refreshDraftTracker, 90 * 1000);
    } else if (!visible && draftTimer) {
      clearInterval(draftTimer); draftTimer = null;
    }
  }

  async function loadStories() {
    var btn = document.getElementById('refresh-btn');
    if (btn) { btn.disabled = true; btn.classList.add('spinning'); }
    try {
      var res = await fetch('stories.json?nc=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var data = await res.json();
      if (!data || !data.clusters || data.clusters.length === 0) throw new Error('empty');
      allData = data;
      if (data.poll && data.poll.question) {
        var prevQ = localStorage.getItem('sb_poll_question');
        if (prevQ !== data.poll.question) { localStorage.removeItem('sb_poll_v1'); localStorage.setItem('sb_poll_question', data.poll.question); }
        POLL = data.poll;
      }
      if (Array.isArray(data.picks) && data.picks.length) PICKS = data.picks;
      if (Array.isArray(data.predictions) && data.predictions.length) PREDICTIONS = data.predictions;
      if (Array.isArray(data.highlights) && data.highlights.length) HIGHLIGHTS = data.highlights;
      if (activeCat === 'analytics') renderActiveSub();
      else renderFeed(allData);
      renderSidebar(allData);
      refreshDraftTracker();
      renderWidget();
      var t = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
      document.getElementById('updated-label').textContent = 'Feed updated ' + t + ' · auto-refreshes every 2h';
      if (typeof renderTicker === 'function') renderTicker(allData);
    } catch(err) {
      console.warn('loadStories error:', err.message);
      if (allData) {
        if (activeCat === 'analytics') renderActiveSub();
        else renderFeed(allData);
      } else {
        document.getElementById('main-feed').innerHTML = '<div class="loading-state"><div class="loading-title">Loading stories...</div><div class="loading-sub">If this persists, go to GitHub Actions and run the Refresh Stories workflow.</div></div>';
      }
    } finally {
      var btn2 = document.getElementById('refresh-btn');
      if (btn2) { btn2.disabled = false; btn2.classList.remove('spinning'); }
    }
  }
  async function fetchScores(leagueId) {
    activeLeague = leagueId;
    // Update tab active state for main-feed tabs
    document.querySelectorAll('.main-score-tab').forEach(function(t){
      var lg = ESPN_LEAGUES.find(function(l){return l.id===leagueId;});
      t.classList.toggle('active', lg && t.textContent === lg.label);
    });
    var el = document.getElementById('scores-games');
    if (!el) return;

    // Serve from short-lived cache (5 min)
    var cached = scoresCache[leagueId];
    if (cached && Date.now() - cached.ts < 300000) { el.innerHTML = cached.html; return; }

    el.innerHTML = '<div class="score-loading">Loading scores...</div>';
    try {
      var league = ESPN_LEAGUES.find(function(l){return l.id===leagueId;});
      var res  = await fetch(league.url);
      var data = await res.json();
      var events = data.events || [];
      if (events.length === 0) { el.innerHTML = '<div class="score-loading">No games today.</div>'; return; }

      var html = events.slice(0, 12).map(function(ev) {
        var comp   = ev.competitions[0];
        var teams  = comp.competitors;
        var home   = teams.find(function(t){return t.homeAway==='home';}) || teams[0];
        var away   = teams.find(function(t){return t.homeAway==='away';}) || teams[1];
        var status = ev.status;
        var stateType = status.type.name; // STATUS_FINAL, STATUS_IN_PROGRESS, STATUS_SCHEDULED
        var statusTxt, isLive = false;
        if (stateType === 'STATUS_FINAL') {
          statusTxt = status.type.shortDetail || 'Final';
        } else if (stateType === 'STATUS_IN_PROGRESS') {
          statusTxt = status.displayClock ? (status.period ? 'Q'+status.period+' ' : '') + status.displayClock : 'Live';
          isLive = true;
        } else {
          var d = new Date(ev.date);
          statusTxt = d.toLocaleDateString('en-US',{weekday:'short'}) + ' ' +
                      d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
        }
        var hScore = parseInt(home.score) || 0;
        var aScore = parseInt(away.score) || 0;
        var hWin = stateType==='STATUS_FINAL' && hScore > aScore;
        var aWin = stateType==='STATUS_FINAL' && aScore > hScore;
        var hName = home.team.shortDisplayName || home.team.abbreviation || '';
        var aName = away.team.shortDisplayName || away.team.abbreviation || '';
        var hDisp = stateType==='STATUS_SCHEDULED' ? '' : hScore;
        var aDisp = stateType==='STATUS_SCHEDULED' ? '' : aScore;
        return '<div class="main-score-card">'+
          '<div class="main-score-row '+(aWin?'winner':'')+'"><span class="main-score-team">'+esc(aName)+'</span><span class="main-score-num">'+aDisp+'</span></div>'+
          '<div class="main-score-row '+(hWin?'winner':'')+'"><span class="main-score-team">'+esc(hName)+'</span><span class="main-score-num">'+hDisp+'</span></div>'+
          '<div class="main-score-footer'+(isLive?' live':'')+'">'+esc(statusTxt)+'</div>'+
        '</div>';
      }).join('');

      scoresCache[leagueId] = { html: html, ts: Date.now() };
      el.innerHTML = html;
    } catch(err) {
      el.innerHTML = '<div class="score-loading">Could not load scores.</div>';
    }
  }


  setDateline();
  setInterval(setDateline, 60000);
  renderWidget();
  renderPicksFeed();
  loadStories();
  refreshDraftTracker();  // parallel with stories.json — live ESPN data doesn't need to wait
</script>
