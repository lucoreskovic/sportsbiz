name: Refresh Stories

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate stories
        run: node generate.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push stories.json
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add stories.json
          git diff --staged --quiet || git commit -m "Refresh stories $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
